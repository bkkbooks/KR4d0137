front:
  text: 􅀛山先生語録卷第二朝廷立法臺察不許言天下利害諌官不許論
  hash: sha256:dd4bad118c22b5fe48fc6ae8c6088239fd3d97b238b0e3d12ecbcb2136a0cf36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0137_SBCK_002-1a}
body:
  text: 人才命爲臺諌是使之言也而又禁之何理哉如命以中書舎人或升黜不當繳還詞頭則更屬他中書舎人爲之命以給事中或有必行之事則不復過門下而所謂中書舎人給事中者亦更不整理且如此是不得其職矣不得其職則當去而今之君子安爲之其義焉在常平司有支用雖是勑取法當執奏近又免執奏之法關防甚宻何可免也使吾軰得爲常平官如此等事亦當辨明則知今之要路大抵難處也先王之時工執藝事以諌自此推之則當是時凡有職者皆得執其事以諌矣􅀂人人有職事皆能思其利害以諌法度何憂不完政事何憂不成且古者百工猶能信度以申其說而今之侍從􅁥司蓋内外之逹官人主所親信者反未嘗知諌此又何理也天生聦明時乂所謂天生者因其固然而無作之謂也無所作聦明是謂憲天聦明憲天云者任理而已矣故伊尹曰視逺惟明聽德惟聦知此然後可與論人君之聦明矣或曰爲人君須聦明有以勝人然後可以制人而止其亂曰天聦明期於勝人非也如人聽訟必欲即揣知其情狀是非亦或屢中􅀂不任理只是億度而已非所謂聦明故孔子曰聽訟吾猶人也必也使無訟乎人君如不聽德毎事即揣知情狀是非所中雖多失人君之道矣謂之不聦明可也作詩不知風雅之意不可以作詩詩尚譎諌唯言之者無罪聞之者足以戒乃爲有􅀘􅀂諌而渉於毀謗聞者怒之何􅀘之有觀蘇東坡詩只是譏誚朝廷殊無温柔敦厚之氣以此人故得而罪之􅀂是伯淳詩則聞之者自然感動矣因舉伯淳和温公諸人禊飲詩云未須愁日暮天際乍輕隂又泛舟詩云只恐風花一片飛何其温厚也考槃之詩言永矢弗過說者曰誓不過君之朝非也矢陳也亦曰永言其不得過耳昔者有以是問常夷甫之子立立對曰古之人蓋有視其君如㓂讎者此􅀹害理何則孟子所謂君之視臣如犬馬則臣視君如㓂讎以爲君言之也爲君言則施報之道此固有之􅀂君子之自處豈處其薄乎孟子曰王庶幾改之予日望之君子之心蓋如此考槃之詩雖其時君使賢者退而窮處爲可罪夫苟一日有悔過遷善之心復以用我我必復立其朝何終不過之有大抵今之說詩者多以文害辭非徒以文害辭也又有甚者分析字之偏傍以取義理如此豈復有詩孟子引天生蒸民有物有則民之秉彞好是懿德曰故有物必有則民之秉彞也故好是懿德其釋詩也於其本文加四字而已而語自分明矣今之說詩者殊不知此郭汾陽不問發墓之人雖古之齊物我者不能過問謝安屐齒折事識者不信是否曰此事未必無但史於此亦失之億度安知其非偶然乎􅀂破賊而喜在謝安固不足怪然屐齒必不爲一時遑遽而致折也或謂人當無利心然後爲君子曰以此自爲可也以此責人恐不勝責矣人但能於得處知辨義理亦自難得故孔子以見利思義稱成人而以見得思義稱士焉此其辨也物有圭角多刺人眼目亦易玷闕故君子處丗當渾然天成則人不厭棄矣溝洫之量不可以容江河江河之量不可以容滄海有所局故也􅀂君子則以天地爲量何所不容有能􅂢一金而不顧者未必能􅂢十金能􅂢十金而不顧者未必能􅂢百金此由所見之熟與不熟非能眞知其義之當與否也􅀂得其義矣雖一介不妄予亦不妄取丗之事􅀑神所以䧟於淫謟者皆其不知􅀑神之情狀祭祀之深意也學者當求知之漢儒言祖有功宗有德不毀所以勸也曰非也子孫之祭其親豈爲其功德而後􅀕之乎􅀂以爲有功德然後祭是子孫得揀擇其祖宗而尊之也豈事親之道哉秦少游以韋元成爲腐儒惡其建毀廟之議其說曰君子將營宫室宗廟爲先廐庫爲次居室爲後夫營之先親而後身則毀之先身而後親可知矣漢之離宫别館長楊五柞巳大侈靡未聞其毀乃取韋元成毀廟之說亟行之此元帝寢疾所以夢祖譴責也其後又復豈終可改乎曰審宗廟也則不容以所未當毀者而毀之矣先王之禮天子􅀕天地諸侯􅀕社稷父爲士子爲大夫葬以士祭以大夫父爲大夫子爲士葬以大夫􅀕以士支子不祭有事則祭于宗子之家明非繼體也如是則祭與不祭皆不可茍矣漢之廟在郡國蓋以千數嵗時皆諸侯王主祭豈古禮哉使漢祖宗有靈當不享矣立無度之廟致不享之􅀕以此事神尚不欲毀邪以夢寐而復旣未知􅀑神之情狀引之爲證其說陋矣且誠如所論先王當行之矣先王豈不敬神哉耳餘之交相責之深相知之淺耳故不終知合内外之道則顔子禹稷之所同可見蓋自誠意正心推之至於可以平天下此内外之道所以合也故觀其意誠心正則知天下由是而平觀其天下平則知非意誠心正不能也兹乃禹稷顔回之所以同也問師也辟何以見曰語云堂堂乎張也難與並爲仁矣蓋幾於辟然此其􅀄也學於孔門者皆終有進焉􅀂子張後來論交曰我之大賢歟於人何所不容此豈介僻之流孟子曰人之有四端猶其有四體也夫四體與生俱生身體不備謂之不成人闕一不可亦無先後之次老子言失道而後德失德而後仁失仁而後義失義而後禮禮者忠信之薄是特見後丗爲禮者之弊耳先王之禮本諸人心所以節文仁義是也顧所用如何豈有先後雖然老子之薄而末之者其意欲民還淳反樸以救一時之弊而巳夫果能使民還淳反樸不亦善乎然天下豈有此理夫禮文其質而巳非能有所増益也故禮行而君臣父子之道得使一日去禮則天下亂矣􅀂去禮是去君臣父子之道也而可乎唯不可去此四端所以猶人之有四體也今學者將仁小􅁍故不知求仁孔子曰􅀂聖與仁則吾豈敢孔子尚不敢當且罕言之則仁之道不亦大乎然則所謂合而言之道也何也曰由仁義行則行仁義所謂合也洪範傳曰道萬物而無所由命萬物而無所聽唯天下至神爲能與於此此爲不知道與命也孔子之言道曰誰能岀不由户何莫由斯道也其言命曰道之將行也歟命也道之將廢也歟命也夫道非能使人由之命非能使人聽之人自不能違耳聖人雖至神以謂體道而至於命則可也􅀂曰無所由無所聽將焉之乎且聖人未嘗不欲道之興以無可奈何故委之於命如使孔子必可以爲周公之事其不爲之乎可爲而不爲則是欲道之廢矣豈孔子之心哉故曰道萬物而無所由命萬物而無所聽者不知道與命之言也又洪範傳論水火金木土自然之數配諸人之一身皆有先後之序此有序乎夫五行在天地之間有則俱有故曰闕一不可今曰有水然後有火有火然後有木有木然後有金有金然後有土雖常人皆知其不然矣然則謂精神䰟魄意爲有序失之矣或問臺諌官如何作曰剥之􅂏曰不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也夫君子之於小人方其進也不可以驟去觀剥之􅁚斯可見矣剥坤下而艮上坤順也艮止也此天理之不可易者也順而止之其漸而非􅁀之謂乎隂陽之氣消息盈虚必以其漸君子所尚蓋在於此君子之治心養氣接物應事唯直而巳直則無所事矣康子饋藥孔子旣拜而受之矣乃曰丘未逹不敢嘗此疑於拂人情然聖人愼疾豈敢嘗未逹之藥旣不敢嘗則直言之何用委曲微生髙乞鄰醯以與人是在今之君子蓋常事耳顧亦何害然孔子不以爲直以所以辭康子之言觀之信乎其不直也維摩經云直心是道􅂣儒佛至此實無二理學者必欲進德則行已不可不直蓋孔子之門人皆於其師無隱情者知直故也如宰我短䘮之問之􅀋范濟美問讀論語以何爲要曰要在知仁孔子說仁處最冝玩味曰孔子說處甚多􅀹的當是何語曰皆的當但其門人所至有不同故其答之亦異只如言剛毅木訥近仁自此而求之仁之道亦自可知蓋嘗謂曾子在孔門當時以爲魯魯者學道􅀹冝難於他人然子思之中庸聖學所頼以傳者也考其淵源乃自曽子則傳孔子之道者曽子而巳矣豈非魯得之乎由此觀之聦明辨智未必不害道而剛毅木訥信乎於仁爲近矣吕吉甫解孝經義首章云是曽子力所不能問故孔子以其而盡告之曰豈有人未之曉而可以盡告之乎觀孔子門人問爲􅀖者惟顔子一人其他敢爲國者尚少今孝經所論上自天子下至庶人無不及者􅀂其力有未至而盡告之在孔子爲失言於曽子爲無益豈聖賢教與學之道哉孔子云參也魯蓋其􅀄時而後語之以一以貫之曾子於此黙喻則其所得深矣猶以爲魯是學於孔門者獨無所進乎觀論語所載曽子將死之言孟子推明不事有􅀂之意又詳考子思孟子傳道之所自是特以魯終其身者耶學有所患在守陳編而不能斷以獨見之明此其於古人是非所以多失之也京師所聞丙戌四月至六月李似祖曹令德問何以知仁曰孟子以惻隱之心爲仁之端平居但以此體究乆乆自見因問似祖令德㝷常如何說隱似祖云如有隱憂勤恤民隱皆疾痛之謂也曰孺子將入於井而人見之者必有惻隱之心疾痛非在已也而爲之疾痛何也似祖曰岀於自然不可已也曰安得自然如此􅀂體究此理知其所從來則仁之道不逺矣二人退余從容問曰萬物與我爲一其仁之體乎曰然問論語言仁處何語最爲親切曰皆仁之方也􅀂正所謂仁則未之嘗言也故曰子罕言利與命與仁要道得親切唯孟子言仁人心也最爲親切豐尚書稷嘗言少時見雪竇教人惜福云人無壽夭禄盡則死昔元厚之死而復生於隂府見主吏謂之曰君禄未盡他時官至兩府然須惜福乃可延年厚之一生雖一杯飯亦必先减而後食其餘奉養皆不敢過故身爲執政壽逾七十雪竇之言於是可驗今日貴人相髙以侈視其費用皆是無益畢竟何􅀘公聞之曰此猶以利言也􅀂以義言之則簞食萬鍾顧吾所得爲者如何耳呉審律儀勸解易曰易難解曰及今可以致力􅀂後力衰􅁍難曰某嘗觀聖人言易便覺措辭不得只如乾坤兩卦聖人嘗釋其義於後是則解易之法也乾之􅀄九潜龍勿用釋云陽在下也又曰龍德而隱者也又曰下也又曰陽氣潜藏又曰隱而未見行而未成此一爻耳反覆推明至五變其說然後巳今之釋者其於他卦能如是推明乎􅀂不能爾則一爻之義只可用之一事易三百八十四爻爻指一事則是其用止於三百八十四事而巳如易所該其果極於此乎􅀂三百八十四事不足以盡之則一爻之用不止於一事亦明矣觀聖人於繫辭發明卦義尚多其說果如今之解易者乎故某嘗謂說易須髣髴聖人之意然後可以下筆此其所以未敢苟也問邵堯夫云誰信畫前元有易自從刪後更無詩畫前有易何以見曰畫前有易其理甚微然即用孔子之已發明者言之未有畫前蓋可見也如云神農氏之耒耜蓋取諸益日中爲市蓋取諸噬嗑黃帝堯舜之舟楫蓋取諸渙服牛乗馬蓋取諸隨益噬嗑渙隨重卦也當神農黃帝堯舜之時重卦未畫此理眞聖人有以見天下之􅄨故通變以冝民而易之道得矣然則非畫前元有易乎問牆有茨之詩􅀂以爲勸戒似不必存曰著此者欲知此惡不可爲耳所以不可爲以行無隱而不彰雖幽闇深僻之中人亦可以知其詳也人之爲惡多以人莫之知而宻爲之然終不能掩宻爲之者其􅀄心也至於不能掩蓋巳無如之何耳豈其所欲哉此君子所以戒愼乎其所不睹恐懼乎其所不聞也自非狙詐之徒皆知義足以勝利然不爲利疚而遷者幾希如管仲亦知義故其所爲多假義而行自王者之迹熄天下以詐力相髙故常溺於利而不知反由孔子而後爲天下國家不以利言者唯孟子一人守得定九月丁卯子同生曰子同者正名其爲􅁊公之子也猗嗟之詩序曰人以爲齊侯之子其詩曰展我甥􅀆則明莊公非齊侯之子矣以經考之莊公之生􅁊公之六年也至十八年始書夫人姜氏遂如齊而左傳因載申繻之諫與􅁊公適齊之事則前此文姜蓋未嘗如齊也未嘗如齊而人以莊公爲齊侯之子春秋安得而不辨乎此春秋所以爲別嫌明微也閔二年書鄭棄其師觀清人之詩序可見矣文公惡髙克使之將兵禦狄乆而不召遂使衆散而歸豈非棄其師乎蓋惡其人而使之將兵以外之兵何罪故止罪鄭齊􅁊公攘戎狄而封衛未嘗請命于天子而專封之也故春秋書城楚丘而不言其封衛蓋無取焉然則木􅀲羙􅁊公孔子何以取之曰木􅀲之詩衛人之詩也衛爲狄所㓕􅁊公救而封之其恩豈可忘也欲厚報之不亦冝乎在衛人之義不得不以爲羙其取之也以衛人之義而巳􅀂春秋褒貶示天下之公故無取鄭季常作太學博士言養士之道當先善其心今殊失此意未知所以善之之方曰由今之道雖賢者爲教官必不能善人心曰使荆公當此職不知如何曰荆公爲相其道蓋行乎當年今日學法荆公之法也巳不能善之矣季常良乆曰如是如是與季常言學者當有所疑乃能進德然亦湏着力深方有疑今之士讀書爲學蓋自以爲無可疑者故其學莫能相尚如孔子門人所疑皆後丗所謂不必疑者也子貢問政子曰足食足兵民信之矣子貢疑所可去荅之以去兵於食與信猶有疑焉故能發孔子民無信不立之說􅀂今之人問政使之足食與兵何疑之有樊遲問仁子曰愛人問智子曰知人是蓋甚明白而遲猶曰未逹故孔子以舉直錯諸枉能使枉者直教之由是而行之於智之道不其庶矣乎然遲退而見子夏猶申問舉直錯諸枉之義於是又得舜舉皐陶湯舉伊尹爲證故仁智兼盡其說子夏問巧􅀏倩􅀆羙目盻􅀆直推至於曰禮後乎然後巳如使今之學者方得其􅀄問之荅便不復疑矣蓋嘗謂古人以爲疑者今人不知疑也學何以進季常曰某平生爲學亦常自謂無疑今觀所言方知古之學者善學問中庸只論誠而論語曾不一及誠何也曰論語之教人凡言恭敬忠信所以求仁而進德之事莫非誠也論語示人以其入之之方中庸言其至也蓋中庸子思傳道之書不正言其至則道不明孔子所罕言孟子常言之亦猶是矣易曰君子敬以直内義以方外夫盡其誠心而無僞焉所謂直也􅀂施之於事則厚薄􅂭殺一定而不可易爲有方矣敬與義本無二所主者敬而義則自此岀焉故有内外之辨其實義亦敬也故孟子之言義曰行吾敬而巳問孔子許子路升堂其品第甚髙何以見曰觀其死猶不忘結纓非其所養素定何能爾邪苟非其人則遑遽急迫之際方寸亂矣問宰我於三年之喪猶有疑問何也曰此其所以爲宰我也凡學於孔子者皆欲窮究到無疑處方巳三年之喪在他人於此不敢發之宰我疑以朞斷故必求質於聖人雖􅀍深責所不辭也四科之目不盡孔門弟子之賢非可指爲定論楊雄作太元準易此最爲誑後學後之人徒見其言艱深其數汗漫遂謂雄眞有得於易故不敢輕議其實雄未嘗知易問必有事焉而勿正心勿忘勿助長旣不可忘又不可助長當如何着力曰孟子固曰至大至剛以直養而無害則雖未嘗忘亦不助長温良恭儉讓此五者非足以盡孔子然必聞其政者以此耳母意云者謂無私意耳􅀂誠意則不可無也所謂時習者如嬰兒之習書􅀧畫固求其似也􅀂習之而不似亦何用習學者學聖人亦當如此大槩必踐履聖人之事方名爲學習又不可不察習而不察與不習同􅀂今之學者固未嘗習而况於察問何謂屢空曰此顔子所以殆庶幾也學至於聖人則一物不留於􅅐次乃其常也回未至此屢空而巳謂之屢空則有時乎不空億則屢中非至誠前知也故不足取問操則存如何曰古之學者視聽言動無非禮所以操心也至於無故不徹琴瑟行則聞佩玉登車則聞和鸞蓋皆欲収其放心不使惰慢邪僻之氣得而入焉故曰不有博奕者乎爲之猶賢乎巳夫博奕非君子所爲而云爾者以是可以収其放心爾說經義至不可踐履處便非經義􅀂聖人之言豈有人做不得處學者所以不免求之釋老爲其有髙明處如六經中自有妙理却不深思只於平易中認了曾不知聖人將妙理只於㝷常事說了曾子曰士不可以不弘毅人須能弘然後有容因言陳述古先生云丈夫當容人勿爲人所容旁招俊乂列于庶位宰相之任也今宰相欲擢任一人必令登對然後取旨用之夫人之賢不肖一見之頃安能盡知此蓋起於後丗宰相不堪委任之過荆公云利者隂也隂當隱伏義者陽也陽當宣著此說源流發於董仲舒然此正王氏心術之蔽觀其所爲雖名爲義其實爲利春秋正是聖人處置事處他經言其理此明其用理旣明則其用不難知也聖人作處本分之外不加毫末故以孔子之聖孟子止言其不爲巳甚而巳或問操心曰書云以禮制心所謂操也如顔子克己復禮最學者之要􅀂學至聖人則不必操而常存􅀭雄言能常操而存者其唯聖人乎此爲不知聖人論及莊周言天人處曰絡馬首穿牛鼻是謂人曰是亦天也􅀂絡牛首穿馬鼻則不可謂之天論西銘曰河􅀯先生言理一而分殊知其理一所以爲仁知其分殊所以爲義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等或曰如是則體用果離而爲二矣曰用未嘗離體也且以一身觀之四體百骸皆具所謂體也至其用處則屨不可加之於首冠不可納之於足則即體而言分在其中矣吾從周非從其文也從其損益之意而巳易言利見利用而終不言所以利故孔子罕言利或謂死與􅀑神子路所不得而問蓋不曉一致之理故錯認聖人之言宰我問三年之喪非不知其爲薄也只爲有疑故不敢隱於孔子只此無隱便是聖人作處問伯夷聖人猶有隘何也曰此自氣禀不同耳􅀂觀其百丗之下聞其風者頑夫廉懦夫有立志此是甚力量餘杭所聞丁亥三月自侍下來周公東征􅀖君御事皆以爲不可周公徒得十夫之助决意征之禹征有苗㑹羣后誓之旣巳岀師朝廷上下冝無不以爲當者而益以一言賛之禹遂振旅而還而苗亦隨格豈周公之德不逮禹乎蓋舜之時在廷莫非君子而天下巳大治矣其敢逆命者獨有苗而已縱而不治未足爲害如必欲誅之則太平之民自受其病矣故與其勤師逺伐不􅀂修德以待其來之爲愈也􅀂夫三監之叛其變起王室非可以夷狄待之也况又成王㓜冲涖政之􅀄君子之道不勝小人不誅而縱之其禍將不勝救矣當是之時雖無十夫之助周公亦不可巳此所以必征之也易曰莧陸夬夬中行无咎其舜之事乎如往年靖州之師其出固有名􅀂以舜之事言之其孰爲得自靖爲郡荆湖至今􅀍其害問帝乃誕敷文德則自班師之後然後敷之也敷文德之事何以見曰舞干羽是也古之時文武一道故干戈兵噐也用之於戰陣則爲武用之於舞蹈則爲文曰敷文德云者巳不爲武備矣人之生也直是以君子無所往而不用直直則心得其正矣以乞醯證父爲直不得其正者也古之於㓜子常示母誑所以養其直也其養之也有素如此以怨報怨以德報怨皆非直也所謂直者公天下之好惡而不爲私焉耳曰如是則以德報德何以辨之曰所謂德非姑息之謂也亦盡其道而不爲私焉耳􅀂姑息則不能無私矣曰人有德於我不幸而適遇所當施之者非吾意之所欲能不少有委曲如􅁃公之斯之於子濯孺子不亦可乎曰然問舜之時在廷之臣多矣至傳禹以天下而禹獨推皐陶何也曰舜徒得此兩人而天下已治故也禹揔百揆而皐陶施刑内外之治舉矣古者兵刑之官合爲一觀舜之命皐陶蠻夷猾夏是其責也則皐陶之職所施於外者爲詳故皐陶雖不可以無禹而禹亦不可以無皐陶是以當舜之欲傳位禹獨推之餘人不與焉孟子曰舜以不得禹皐陶爲已憂而子夏亦言舜有天下選於衆舉皐陶不仁者逺矣蓋有見乎此忠信乃爲進德之基本無忠信則如在虚空中行德何以進問孔子於舊舘人之喪遇於一哀而岀涕遂說驂以􅉠之曰吾惡夫涕之無從也而顔淵死子哭之慟顔路請子之車以爲之槨而不與何也曰遇於一哀而岀涕者不期然而然也然哀有餘也故必有以文之此說驂之禮所由起乎顔淵死子曰天喪予天喪予則其存亡與之爲一矣故其哭之也不自知其慟也其於此奚以文爲文非所以施於顔淵則車之與不與也惟義所在而已􅀗乎上有道不信乎朋友弗􅀗乎上矣信乎朋友有道不順乎親弗信乎朋友矣順乎親有道反身不誠不恱於親矣今之君子欲行道以成天下之務反不知誠其身豈知一不誠它日舟中之人盡爲敵國乎故曰不誠未有能動者也夫以事上則上疑以交朋友則朋友疑至於無往而不爲人所疑道何可行哉蓋忘機則非其􅀋可親機心一萌鷗鳥舞而不下矣大學一篇聖學之門户其取道至徑故二程多令􅀄學者讀之蓋大學自正心誠意至治國家天下只一理此中庸所謂合内外之道也􅀂内外之道不合則所守與所行自判而爲二矣孔子曰子帥以正孰敢不正子思曰君子篤恭而天下平孟子曰其身正而天下歸之皆明此也伊尹所以事君更無回互唯知忠而巳所以能爲放太甲之事然如此而天下不疑者誠意素著故也因問孟子云有伊尹之志則可後丗之爲人臣者不幸而適遇此事而有伊尹之志不知行得否􅀂行不得是伊尹之事不可法於後也曰􅀂有伊尹之志其素行足信何爲不可但觀蜀先主當時以其子屬諸􅁑孔明曰嗣子可輔輔之如不可輔君自取之備死孔明操一國之權當時軍國大務人材進退唯孔明是聽而蜀之人亦莫之疑也蓋孔明自非􅆲弑之人其素行足信也􅀂如司馬懿其誰信之伊尹之事自後丗觀之以爲異其實亦所謂中道問成湯放桀惟有慙德何也曰橫渠嘗言湯武之功聖人之不幸也􅀂論君臣之義則爲臣而事其君當使其君如堯舜乃是旣不能使其君如堯舜至其君得罪於天下而放之豈其所欲哉成湯之事以言順乎天而應乎人何慙之有然自人情觀之旣以堯舜之禪爲盡善則征誅而有天下安能無愧乎問文姜與齊侯淫詩人以不能防閑其母刺莊公莊公固當深罪乎曰固可罪也觀載驅之詩言魯道有蕩則魯之君臣蕩然無以禁止之也夫君夫人之岀入其威儀物數甚矣其曰齊子夕發又何其易乎禮婦人㓜從父兄嫁從夫夫死從子旣曰從子子乃不能防閑之恣其淫亂於誰責而可乎許穆夫人思歸唁其兄而義不得其賦載馳之詩曰大夫君子無我有􅀹是雖欲歸不可得也曰凱風何以美孝子曰不能安其室是求嫁也嫁猶以正非如姜氏之淫于齊也又此詩之所取特美其􅀒罪引慝而巳􅀂叔于田之詩序所謂不勝其母以害其弟其刺之蓋與猗嗟之刺莊公同意或曰吕吉甫云管仲今人未可輕議之如列子所載仲論隰朋之爲人上忘而下不叛愧不􅀂黃帝而哀不己􅀂者又如論語稱管仲奪伯氏駢邑三百飯䟽食没齒無怨言則其所能所爲可謂髙矣如仲者但不如孔子耳何可輕議曰此未見仲小器之實也􅀂管仲只不如孔子曾西何以不爲艮止也止其所也故繫辭曰止萬物者莫善乎艮又曰成言乎艮艮者萬物之所成終而所成始也止於此矣復岀乎震不終止也故艮卦曰時止則止時行則行觀盥而不薦有孚顒􅀂誠意所寓故也古人脩身齊家治國平天下本於誠吾意而巳詩書所言莫非明此者但人自信不及故無其效聖人知其效必本於此是以必由也或曰正心於此安得天下便平治曰正心一事自是人未嘗深知之􅀂深知而體之自有其效觀後丗治天下皆未嘗識此然此亦惟聖人力做得徹蓋心有所忿懥恐懼好樂憂患一毫少差即不得其正自非聖人必湏有不正處然有意乎此者隨其淺深必有見效但不如聖人之效著矣觀王氏之學蓋未造乎此其治天下專講求法度如彼脩身之潔冝足以化民矣然卒不逮王文正吕晦叔司馬君實諸人者以其所爲無誠意故也明道常曰有􅀜雎麟趾之意然後可以行周官之法度蓋深逹乎此因問顔子克巳欲正心耶曰然或問經綸天下湏有方法亦湏才氣運轉得行曰天保以上治内采薇以下治外先王經綸之迹也其效博矣然觀其作處豈嘗費力本之誠意而巳今鹿鳴四牡諸詩皆在先王所歌以燕群臣勞使臣者也􅀂徒取而歌之其有效乎然則先王之用心蓋有在矣如書堯典序言克明俊德以至親睦九族平章百姓恊和萬􅀖法度蓋未及也而其效巳臻􅀺民於變時雍然後乃命羲和欽􅀂昊天之事然則法度雖不可廢豈所宜先未易見而玩易之文以言易􅀂說得深即不是聖人作用處􅀂說得淺常人之談耳因言秦漢以下事曰亦湏是一一識别得過欲識别得過湏用着意六經六經不可容易看了今人多言要作事湏看史史固不可不看然六經先王之迹在焉是亦足用矣必待觀史未有史書以前人何以爲據蓋孔子不存史而作春秋春秋所以正史之失得也今人自是不留意六經故就史求道理是以學愈博而道愈逺􅀂經術明自無工夫及之使有工夫及之則取次提起一事便湏斷遣處置得行何患不能識别盥而不薦􅀄未嘗致物也威儀度數亦皆未舉而巳有孚顒􅀂其所以交於神明者蓋有在矣又云禮莫重於􅀕􅀕莫重於灌蓋求􅀑神於幽隂之時未致其文於此而能致誠以格􅀑神則自灌而往其威儀度數足觀矣􅀂不旣其實而徒以䌓文從事何足觀乎故孔子嘗曰禘自旣灌而往者吾不欲觀之矣蓋歎時也易曰東鄰殺牛不如西鄰之禴􅀕又曰二簋可用享其不貴物而貴誠如此又云古人所以交神而接人其道一主於誠􅀄無二也故曰明則有禮樂幽則有􅀑神幽明本一理故所以感之者亦以一理聖人以神道設教而天下服所謂神道誠意而巳誠意天德也又云無誠意以用禮則所爲繁文末節者僞而巳故老子絶㓕禮學而曰忠信之薄亂之首也予欲觀古人之􅁚汝明非謂明其禮意也衣服所以章有德五服五章或非其稱不明孰甚焉棠棣之言朋友不可相責望蓋君子恕以處朋友也􅀂爲人朋友所以自處則不可爾周官以孝友睦婣任恤考人之行􅀂不可責人聖人何以制法夫鄰里郷黨力足以相助相持猶不敢不勉而况於朋友乎問所解論語犯而不校處云視天下無一物非仁也故雖犯而不校此如四海皆兄弟之義看否曰然仁者與物無對自不見其有犯我者更與誰校如孟子言仁者無敵亦是此理􅀛山先生語録卷第二
