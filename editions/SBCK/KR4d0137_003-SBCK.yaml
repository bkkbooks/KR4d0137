body:
  text: 餘杭所聞􅀭雄云多聞守之以約多見守之以卓其言終有病不如孟子言博學而詳說之將以反說約也爲無病蓋博學詳說所以趨約至於約則其道得矣謂之守以約卓於多聞多見之中將何守見此理分明然後知孟子之後其道不傳知孟子所謂天下可運於掌爲不妄正心到寂然不動處方是極致以此感而遂通天下之故其於平天下也何有曾子開不以顔色語言假借人其愼重爲得大臣之體於今可以庶幾前輩風流者惟此一人耳齊戰在聖人何以愼曰齊所以事神戰所以用民命固當愼也曰孔子云我戰則克祭則受福何也曰此非聖人之言王者之兵有征無戰必也臨事而懼好謀而成又敢自謂其能克乎夫祭之爲道􅀄不爲致福故祭祀不祈君子於其親春秋祭祀以時思之其他所祭報本反始而巳何求福之有又曰武王三分天下有其二度德量力皆足以勝受而無疑焉而曰受克予非朕文考有罪惟予小子無良是不敢必其戰之勝也而記稱孔子之言曰我戰則克必不然矣問或謂人主之權當自主持是否曰不爲臣下奪其威柄此固是也書稱湯曰用人惟已而孟子亦曰見賢焉然後用之則人君之權豈可爲人所分然孟子之論用人去人殺人雖不聽左右諸大夫之毀譽亦不聽國人之公因國人之公是非吾從而察之必有見焉而後行如此則權常在我矣􅀂􅀄無所見姑信己意爲之亦必終爲人所惑不能固執矣問或謂衞於王室爲近懿公爲狄所㓕齊􅁊公攘戎狄而封之當是時夷狄横而中國微􅁊公獨能如此故孔子曰微管仲吾其􅀍髮左袵矣爲其功如此也觀􅀳室之亂胡羯猖獗於中原當是時只爲無一管仲故顚沛如此然則管仲之功後丗信難及也曰􅀂以後丗論之其功不可謂不大自王道觀之則不可以爲大也今人只爲見管仲有此故莫敢輕議不知孔孟有爲規模自別見得孔孟作處則管仲自小曰孔孟如何曰必也以天保以上治内以采薇以下治外雖有夷狄安得遽至中原乎如小雅盡廢則政事所以自治者俱亡四夷安得而不交侵中國安得而不微方是時縱能救之於巳亂雖使中國之人不至􅀍髪左袵蓋猶賢乎周衰之列國耳何足道哉如孟子所以敢輕鄙之者蓋以非王道不行故也曰然則孔子何爲深取之曰聖人之於人雖有毫末之善必録之而况於仲乎􅀂使孔子得君如管仲則管仲之事蓋不暇爲矣問或謂今丗直道難行必有術焉􅀂事事要是自立不任道如何行得觀周勃狄仁傑之在漢唐必須優柔浸灌蒙恥忍垢俟時而後發故功成事遂如必危言極論則速禍無􅀘矣曰學者當以聖王爲師如周勃何人而可取法勃之不爲禄産戮也幸矣觀其提北軍而入也號於衆曰爲劉氏者左􅃝此最爲無謀設使當時吕氏之黨先有以固結衆心皆爲之右􅃝何以處之非唯皆右􅃝只使左右􅃝者相半亦不能决勝矣豈不危乎曰勃湏知衆皆爲劉氏故爲此說曰旣知其爲劉氏則此說􅀹爲贅語爲勃之計但當問義之所在以義驅之可也如當時平勃兩人俛首以事吕后其在平則或有謀在勃驅之爲亂亦固從之矣此何可保觀勃􅀄無學術亦無智略庸謬人耳方文帝諭之就國畏帝以事誅之至使人以兵甲左右爲衛􅀂果君命見誅勃殆將以所自衛者叛乎此􅀹可􅀏也後之人多以成敗論人物故如勃者得與忠賢之列亦可謂幸矣狄仁傑在武后時能撥亂反正謂之社稷臣可也然亦何嘗挾數任術觀史氏所載其議論未嘗不以正當時但以母子天性之說告武后其濵於死者亦屢矣卒至武后怒而言曰還汝太子夫豈嘗姑務柔從以隂幸事之成乎孟子曰君子創業垂統爲可繼也􅀂夫成功則天也人臣之事君或逺或近或去或不去歸㓗其身而巳可也豈可枉已以求難必之功乎又言西漢之士多尚權謀戰國餘俗也觀髙祖時只有一張子旁乃君子人其他少有可敢者又言班固稱髙祖謂王陵少戇可以佐陳平然安劉氏者必勃此語蓋未驗也陳平獨任事甚乆王陵一言而免終不曾佐得陳平平獨任亦無變孟子言人不足與適也政不足與間也惟大人爲能格君心之非蓋人與政俱不足道則須使人君心術開悟然後天下事可循序整頓然格君心之非須要有大人之德大人過人處只是正已正已則上可以正君下可以正人今之賢者多尚權智不把正己爲先縱得好時節終是做不徹或謂權智之人亦可以救時據某所見正不欲得如此人在人君左右壞人君心術因言人君喻臺諫言事􅀂事當言可以言否曰英宗朝傅欽之奏劄子上不從因曰臺諫有合理㑹事􅁍不理㑹欽之曰不知方今合理㑹者是何事上曰何不言蔡襄欽之云􅀂襄有罪陛下何不自朝廷竟正典刑責之安用臣等言上曰欲使臺諫言其罪以公議岀之欽之云􅀂付之公議臣但見蔡襄辨山陵事有功不見其罪臣身爲諫官使臣受旨言事臣不敢因言特旨及御筆行遣事曰仁宗時或勸云陛下當収攬權柄勿令人臣弄威福仁宗曰如何収􅄃權柄或曰凡事湏當自中岀則福威歸陛下矣仁宗曰此固是然措置天下事正不欲自朕岀􅀂自朕岀皆是則可如有不是難於更改不如付之公議令宰相行之行之而天下以爲不便則臺諫得言其失於是改之爲易矣據仁宗識慮如此天下安得不治人君無心如天仁宗是也曾子開端嚴可畏有大臣之風􅀂其軰流雖位崇望重少不以言語禮貌牢籠人者殊爲失體章郇公在私第子弟有夜叩門禀事者公曰􅀂是公事明早來待漏院理㑹􅀂是私事即於堂前夫人處禀覆在中書一日坐處地䧟徐起使人塡之不以爲怪家人聞之甚憂及公還家亦不言至晚公與弟虞部者對飲虞部問公今日聞中書地䧟是否曰中書地何干汝事竟不言前輩大抵有此氣象卒乍揺撼不動爲政要得厲威嚴使事事齊整甚易但失於不寛便不是古人作處孔子言居上不寛吾何以觀之哉又曰寛則得衆􅀂使寛非常道聖人不只如此說了今人只要事事如意故覺見寛政悶人不知權柄在手不是使性氣處何嘗見百姓不畏官人但見官人多虐百姓耳然寛亦須有制始得􅀂百事不管唯務寛大則胥吏舞文弄法不成官府須要權常在已操縱予奪揔不由人儘寛不妨伯淳作縣常於坐右書視民如傷四字云某毎日常有愧於此觀其用心應是不錯决撻了人古人於民􅀂保赤子爲其無知也常以無知恕之則雖有可怒之事亦無所施其怒無知則固不察利害所在教之趣利避害全在保者今赤子􅀂無人保則雖有坑穽在前蹈之而不知故凡事疑有後害而民所見未到者當與他做主始得州縣近令勸誘富民買鹽勸誘即須有買者但異時令百姓買鹽其􅀄亦令勸誘百姓名一入官以後便不可脫爲民父母豈可暫時罔之使之終身受其害孟子一部書只是要正人心教人存心養性収其放心至論仁義禮智則以惻隱羞惡辭讓是非之心爲之端論邪說之害則曰生於其心害於其政論事君則欲格君心之非正君而國定千變萬化只􅀃從心上來人能正心則事無足爲者矣大學之脩身齊家治國平天下其本只是正心誠意而巳心得其正然後知性之善孟子遇人便道性善永叔却言聖人之教人性非所先永叔論列是非利害文字上儘去得但於性分之内全無見處更說不行人性上不可添一物堯舜所以爲萬丗法亦只是率性而巳所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔問如管仲之才使孔子得志行乎天下還用之否曰管仲髙才自不應廢但紀綱法度不岀自他儘有用處曰􅀂不使他自爲或不肯退聽時如何曰如此則聖人廢之不問其才因言王道本於誠意觀管仲亦有是處但其意别耳如伐楚事責之以包茅不貢其言則是􅀂其意豈爲楚不勤王然後加兵但欲楚尊齊耳尊齊而不尊周管仲亦莫之詰也􅀂實尊周專封之事仲豈宜爲之故孟子曰五覇假之也蓋言其不以誠爲之也今蘇州朱沖施貧度僧置安樂院給病者醫藥人頼以活甚衆其置物業則厚其直及其収息則視衆人所取而輕之此皆是好事只爲其意正在於規利而竊譽於人故人終不以好人許之仲尼之門無道􅁊文之事而孟子直截不比數之其意亦猶此也又言自孟子後人不敢小管仲只爲見他不破近丗儒者如荆公雖知卑管仲其實亦識他未盡况於餘人人􅀂知王良羞與嬖奚比而得禽獸雖􅀂丘陵弗爲之意則管仲自然不足道又言管仲只爲行詐故與王者别􅀂王者純用公道而巳又言覇者之民驩虞如也治民使之驩樂有甚不得但如所謂皡皡如也則氣象便與霸者之丗不同蓋彼所以致人驩虞必有違道干譽之事􅀂王者則如天亦不教人喜亦不教人怒瑩中言乗舟事最好然元祐舟不知爲甚樁得太重及紹聖時不知却如何亦偏多載了據此兩舟所載者因何物得重今當减去何物則適平􅀂􅀍人問到此湏有處置始得如是本分處置得事之人必湏有規矩繩墨一一調和得是不令錯了􅀂只說得揔腦便休亦不濟事孟子言天下可運於掌如彼所言天下誠可運於掌也謂曽見志完云上合下便執得繼述兩字牢更不可易因言繼述兩字自好但今用之非是當時自合說與眞箇道理且好貨好色孟子猶不鄙其說而推明之而况上有繼述之意豈容無所開道而使小人乗間謬爲邪說以進則其末流激成今日之弊不足恠矣夫繼述之說始於記所稱武王周公今且舉周公一二事明之文王耕者九一至周公則更而爲徹文王關市譏而不征至周公則征之武王克商乃反商政政由舊逮周公七年制禮作樂昔者文武所由之政安在聖人作處唯求一箇是厎道理􅀂果是雖紂之政有所不革果非雖文武之政有所不因聖人何所容心因時乗理欲天下國家安利而巳且如神考十九年間艱難勤苦制爲法度蓋欲以救時弊便百姓也便百姓則其志救時弊則其事此獨不當繼述乎今繼述足以救時弊便百姓也是亦神考而巳釋此不務乃欲一二以循熈豐之迹不然則爲不孝此何理也且如祖宗有天下百有餘年海内安樂其法度豈皆不善神考一起而更之神考亦謂之不孝可乎自唐末至五代禍亂極矣太祖太宗順人心定天下傳數丗而無變此豈常人做得然而法度不免有弊者時使之然爾􅀂謂時使之然則神考之法豈容獨能無弊􅀘偏救弊是乃神考所以望乎後丗也何害於繼述而顧以爲不孝乎今之所患但人自不敢以正論陳之於上恐有滯礙妨嫌􅀂吾輩在朝廷湏是如此說始得其聽不聽則其去就之義焉議論不知道理所在徒有口辯即勝他識道理人不過如戰國說士遇孟子便無開口處問或謂荆公晚年詩多有譏誚神考處􅀂下注脚儘做得謗訕宗廟他日亦拈得岀曰君子作事只是循一箇道理不成荆公之徒箋注人詩文䧟人以謗訕宗廟之罪吾軰也便學他昔王文正在中書㓂萊公在宻院中書偶倒用了印萊公須勾吏人行遣他日宻院亦倒用了印中書吏人呈覆亦欲行遣文正問吏人汝等且道宻院當􅀄行遣倒用印者是否曰不是文正曰旣是不是不可學他不是更不問如今日所罪謗訕宗廟毀謗朝政者自是不是先王之時惟恐不聞其過故許人規諌至於舜求言乃立謗木是眞欲人之謗己也書曰小人怨汝詈汝則皇自敬德蓋聖人之於天下常懼夫在己者有所未至故雖小人怨詈亦使人主自反詩三百篇經聖人刪過皆可以爲後王法今其所言譏刺時君者幾半不知當時遭謗訕之罪者幾人夫禁止謗訕自出於後丗無道之君不是美事何足爲法􅀂祖宗功德自有天下後丗公議在豈容小已有所抑揚名之曰幽厲雖孝子慈孫百丗不能改夫爲人子孫豈不欲聖賢其祖考但公議以惡名歸之則雖欲改之不能得也其曰名之曰幽厲當時誰實名之兹豈獨其子孫之不孝乎如此在人主前開陳乃是正理今之君子但見人言繼述亦言繼述見人罪謗訕亦欲求人謗訕之迹罪之如此只是相把持正理安在如元祐臣寮章䟽論事今乃以爲謗訕此理􅀹非使君子得志須當理㑹令分明今反謂他門亦嘗謗訕不唯效􅀹兼是使元祐賢人君子愈岀脫不得濟甚事言季常在京時嘗問正心誠意如何便可以平天下與之言後丗自是無人正心􅀂正得心其效自然如此此心一念之間毫髮有差便是不正要得常正除非聖人始得且如吾輩還敢便道自已心得其正否此須是於喜怒哀樂未發之際能體所謂中於喜怒哀樂之後能得所謂和致中和則天地可位萬物可育其於平天下何有因論孟子直以禹稷比方顔子只顔子在陋巷時如禹稷事業便可爲之無難􅀂正心誠意不足以平天下則禹稷功巍巍如此如顔子者如何做得問伯夷柳下惠如何見得能朝諸侯一天下曰只看顔子在陋巷便做得禹稷事業則夷惠之能朝諸侯一天下可知聖人之得􅀖家綏之斯來動之斯和自是力量不同如夷惠之風能使頑夫廉懦夫有立志鄙夫寛薄夫敦􅁬乎百丗之上下聞者莫不興起則其未有爲之時人固已心恱而誠服之矣使得百里之地而君之其效冝如何叔孫通作原廟是不使人主改過而教之耻過作非也此爲萬丗之害今太廟却閑了只嚴奉景靈宫是舎先王之禮而從一謬妄之叔孫通也豈不過乎母意只是去私意􅀂誠意則不可去也重見因讀東坡和淵明形影神詩其影荅形云君如煙上火火盡君乃別我如鏡中像鏡壞我不㓕曰影因形而有無是生㓕相故佛嘗云一切有爲法如夢幻泡影正言其非實有也何謂不㓕他日亦嘗讀九成臺銘云此說得之莊周然而以江山吞吐草木俯仰衆竅呼吸鳥獸號鳴爲天􅄜此乃周所謂地􅄜也但其文精妙讀之者或不之察耳言荆公云天使我有是之謂命命之在我之謂性是未知性命之理其曰使我正所謂使然也然使者可以爲命乎以命在我爲性則命自一物􅀂中庸言天命之謂性性即天命也又豈二物哉如云在天爲命在人爲性此語似無病然亦不湏如此說性命􅀄無二理第所由之者異耳率性之謂道如易所謂聖人之作易將以順性命之理是也謂常問志寧云至道無難惟嫌揀擇其理是否志寧曰是曰􅀂爾公何不殺人放火志寧無語􅀭雄云學所以修性夫物有變壞然後可修性無變壞豈可修乎唯不假修故中庸但言率性尊德性孟子但言養性孔子但言盡性因論荆公法云青苗免役亦是法然非藏於民之道如青苗取息雖不多然嵗散萬緡則奪民二千緡入官旣入官則民間不復可得矣免役法取民間錢雇人役於官其得此錢用者蓋皆州縣市井之人不及郷民郷民惟知輸而巳而不得用故今郷民多乏於財也青苗二分之息可謂輕矣而不見有利於百姓何也今民間舉債其息少者亦湏五七分多者或倍而亦不覺其爲害曰惟其利輕且官中易得人徒知目前之利而不顧後患是以樂請􅀂民間舉債則利重又百端要勒得之極難故人得巳且巳又青苗雖名取二分之息其實亦與民間無異蓋小民旣有非不得巳而請者又有非不得巳用之且如請錢千或遇親舊於州縣間須有酒食之費不然亦須置小小不急之物只使二百錢巳可比民間四分之息又請納時往來之用與官中門户之賂遺至少亦不下百錢况又有胥吏追呼之煩非貨不行而公家期限又與私家不同而民之畏法者至舉債以輸官往往沿此遂破蕩産業者固多矣此所以有害而無利也或云官中息輕民得之可以自爲經營􅀊豈無二分之息乎蓋未之思也􅀂用之商販則錢散而難集正公家期逼卒収不聚失所指準其患不細往年富家知此患也官中配之請不得巳請而藏之比及期岀私錢爲息輸之官乃無患然使民如此是無事而侵擾之也何名􅀘助之政乎翟霖送正叔先生西遷道􅀫僧舎坐處背塑像先生令轉􅀝勿背霖問曰豈以其徒敬之故亦當敬耶正叔曰但具人形貌便不當慢因賞此語曰孔子云始作俑者其無後乎爲其象人而用之也蓋象人而用之其流必至於用人君子無所不用其敬見似人者不忽於人可知矣􅀂於似人者而生慢易之心其流必至於輕忽人孟子言仁者如射蓋生於子思射有似乎君子之說言大人者言不必信行不必果惟義所在蓋生於孔子以言必信行必果爲硜硜然小人之說學校養士反不如居養安濟所費之多如餘杭學今止有三十人而居養安濟乃共有百餘人居養安濟人給米二升錢二十爲士者所給如其數加四錢耳而士未必常在學也則其所費固寡於彼矣􅀂其所養實是窮民疾病者誠善然所養止浮浪游手之徒耳夫厲良民而養游手是何政事近詔又収養年五十者自此往往來者益多所費當益廣夫年五十則子自可昏女自可嫁安得爲無告之窮民乎又其所養多聚異郷之人不許根問來處則雖有父子夫婦官吏何縁得知故其弊爲甚􅀂只許土着人就本貫収養亦易爲檢察而其弊减矣因看合浦論無爲軍役法曰天下役法多有不同處如所論與潭州處置全别潭州紹聖間所定皆岀公之手又言吏有禄本要養其廉耻及不廉故可從而責之此爲待之盡然亦須養得過方得􅀂養他不過不如勿給徒費財耳何則彼爲吏於此蓋欲以活父母妻子故爲之今也養之不過雖有刑戮在前寧免其受賕乎如法曹之俸月十千而法司乃十二千則法吏之禄爲過於法官又常平吏人月給六千此乃可責之以不受賕其餘千錢或二三千而巳給􅁓札尚不足安能活其家則其􅀔湏至乞覔如必􅀂法司常平吏人重其禄則財用之費無所從岀兼是吏禄亦有不用多給者如學士茶鹽司吏人近制禄皆不减十千彼有何事繁難作何情弊而可以當此禄乎􅀂此雖謂之妄費可也民之於上不從其令而朝廷惟以言諭之冝其以爲虚文而莫之聽也今天下非徒不從上令而有司亦不自守成法觀官吏所奉行惟奉行朝廷之意而巳􅀂皆守法則法亦自足以致治且如役法􅂄長許募而不許差輙差者徒二年然法當募上户其傭二千錢逐州縣定此餘杭所定豈有上户肯利􅀂干錢而願役於官乎上户不願則其􅀔湏至強使爲之是名募而實差也其如法何又如日近買翎毛郡不敷諸縣令買者以於法不許抑配故也然翎毛非人所常有而郡中文移督責諸縣但使之催人以其所収藏翎毛輸之官􅀂縣中只依法行遣安得辦集其􅀔亦湏至抑配是名和買而實抑配也如此者皆法之不可行者也法至於不可行則人惟意之從而巳立法要使人易避而難犯則必行而無赦此法之所以行也今法太嚴宻直使人於其間轉側不得故易犯是以犯法之人官吏多不忍行法必宛轉爲犯者之地法如何行得人各有勝心勝心去盡而惟天理之循則機巧變詐不作􅀂懷其勝心施之於事必以一已之是非爲正其間不能無窒礙處又固執之不移此機巧變詐之所由生也孔子曰不知命無以爲君子知命只是事事循天理而巳循天理則於事無固必無固必則計較無所用神考問伯淳王安石如何人伯淳云安石博學多聞則有之守約則未也又嘗問是聖人否伯淳云詩稱周公公孫碩膚赤舄几几聖人蓋如是􅀂安石剛􅄶自任恐聖人不然問子思之不使白也喪岀母也是乎曰禮適子不爲岀母服曰何也曰繼體也問陳莊子死赴於魯縣子謂繆公哭之而曰有愛而哭之有畏而哭之夫􅂘之也以畏何也曰以言丗有然也非古之禮也􅀂古之大夫則束脩之問不岀竟故生無相問其死也何赴告之有哉後丗國亂而君昏爲臣者交政於中國故生則同盟死則赴告非禮也故春秋因其卒而書之所以著其罪也仲素問横渠云氣質之性如何曰人所資禀固有不同者􅀂論其本則無不善蓋一隂一陽之謂道隂陽無不善而人則受之以生故也然而善者其常也亦有時而惡矣猶人之生也氣得其和則爲安樂人及其有疾也以氣不和而然也然氣不和非其常治之而使其和則反常矣其常者性也此孟子所以言性善也橫渠說氣質之性亦云人之性有剛柔緩急強弱昏明而已非謂天地之性然也今夫水清者其常然也至於湛濁則沙泥混之矣沙泥旣去其清者自􅀂也是故君子於氣質之性必有以變之其澄濁而水清之義歟因見王逢原文集曰此髙論怨誹之人也他日嘗曰此子才則髙矣見道則未中庸深處多見於孟子之書其所傳也歟徐師川歸洪州欲不復來先生問之曰公免得仕宦否􅀂端的有以自贍不必復來固好第亦湏着仕官如何師川曰亦以免仕宦未得曰如此則當復來供職仕官處處一般旣未免得須復爲他官逃此之彼彼亦冝有不安處是無地可以自容也師川曰來此復爲人所羅織䧟於禍奈何曰顧吾所自爲者如何耳苟自爲者皆合道理而無愧然而不能免者命也不以道理爲可慿依而徒懼其不免則無義無命矣師川曰極是亦待來此􅀂做不得去之未爲晚又言人只爲不知命故􅂊有些事便自勞攘􅀂知得徹便於事無不安孔子曰天生德於予􅁊魋其如予何固嘗解云使孔子不免於􅁪魋之難是亦天也􅁊魋其如何哉蓋聖人之於命如此夫冨貴死生人無與焉何􅀹人之有孟子分明爲臧倉所毀不遇於魯侯而以爲不遇非臧倉之力蓋知命也列子曰􅁊公非能用讎也不得不用管仲非能舉賢不得不舉此說得之矣曰列子此說似知命然至其論夷惠以爲矜清貞之􅀹以放於餓死寡宗以公孫朝穆之事爲得計以堯舜桀紂之事爲不足較茲豈非其過乎曰其過也􅀂聖人所謂知命義常在其中矣然則彼亦豈得之而不盡者乎曰然仲素問知微之顯莫只是戒愼乎其所不睹恐懼乎其所不聞否曰然因言有僧入僧堂不言而出或曰莫道不言其聲如雷莊周之尸居而龍見淵黙而雷聲可謂善言者也孟子直是知命滕文公以齊人築薛爲恐問救之之術而對以君如彼何哉強爲善而巳矣以竭力事大國則不得免問安之之道而對以太王居邠不以其所養人者害人而繼之以效死不去之䇿自丗俗觀之可謂無謀矣然以理言之只得如此說捨此則必爲儀秦之爲矣凡事求可功求成取必於智謀之末而不循天理之正者非聖賢之道也天理即所謂命語羅仲素云今之學者只爲不知爲學之方又不知學成要何用此事體大須是曾着力來方知不易夫學者學聖賢之所爲也欲爲聖賢之所爲湏是聞聖賢所得之道􅀂只要博通古今爲文章作忠信愿愨不爲非義之士而巳則古來如此等人不少然以爲聞道則不可且如東漢之衰處士逸人與夫名節之士有聞當丗者多矣觀其作處責之以古聖賢之道則畧無毫髪髣髴相似何也以彼於道􅀄無所聞故也今時學者平居則曰吾當爲古人之所爲􅂊有事到手便措置不得蓋其所學以博通古今爲文章或志於忠信愿愨不爲非義而巳而不知湏是聞道故應如此由是觀之學而不聞道猶不學也仲素問詩如何看曰詩極難卒說大抵湏要人體㑹不在推尋文義在心爲志發言爲詩情動於中而形於言言者情之所發也今觀是詩之言則必先觀是詩之情如何不知其情則雖精窮文義謂之不知詩可也子夏問巧􅀏倩􅀆美目盻􅀆何謂也子曰繪事後素曰禮後乎孔子以謂可與言詩如此全要體㑹何謂體㑹且如關雎之詩詩人以興后妃之德蓋如此也須當想象雎鳩爲何物知雎鳩爲摯而有別之禽則又想象關關爲何聲知關關之聲爲和而通則又想象在河之洲是何所在知河之洲爲幽閑逺人之地則知如是之禽其鳴聲如是而又居幽間逺人之地則后妃之德可以意曉矣是之謂體㑹惟體㑹得故看詩有味至於有味則詩之用在我矣語仲素西銘只是發明一箇事天底道理所謂事天者循天理而巳因論􅂫明允權書衡論曰觀其著書之名巳非豈有山林逸民立言垂丗乃汲汲於用兵如此所見安得不爲荆公所薄曰大蘇以當時不去二虜之患則天下不可爲又其審敵篇引晁錯說景帝削地之䇿曰今日夷狄之􅀔是亦七國之􅀔其意蓋欲掃蕩二虜然後致太平耳曰􅂊以用兵爲事只見搔擾何時是天下息肩時節以仁宗之丗視二虜豈不勝如戰國時然而孟子在戰國時所論全不以兵爲先豈以崇虚名而受實弊乎亦必有道矣問秦少游進卷論所以禦戎乃欲以五路之兵􅀊出一路以擾夏人之耕如此是吾五􅀊一出兵而使夏人􅀊􅀊用兵此㓕狄之道也當時元祐間有主此議者此果可用否曰王者之兵有征無戰必不得巳誅其君而弔其民可也豈容如此兼是亦無此理今常以五路之師合攻夏人尚時有不支􅀊出一路其傾國而來攻城破邑吾其可止以一路之衆當之乎大抵今之士人議論只是口頭說得施之於事未必有效言朱公掞上殿神考問欲再舉安􅀯之師公掞對願陛下禽獸畜之蓋夷狄得其地不可居得其民不可使得巳且巳須要廣土闢地何益自紹聖崇寧以來所以待夏人大是失䇿有德此有人有人此有土有土此有財有財此有用今不務德以致人徒得其空地又運中國之財以守之是何所見君臣之間要當一德一心方作得事古之聖賢相與以濟大業蓋無不然者觀舜命禹征有苗巳誓師往伐而益以一言賛禹禹遂班師舜以禹之班師便爲之誕敷文德而有苗格矣舜命禹徂征禹旣行而益有言宜告之舜不告舜而告之禹禹承命於舜及其不遂行也宜先禀之舜乃擅反兵而不疑舜於二人者無責焉可也乃徇其所爲從而相之益之意豈不曰禹猶舜而禹之意豈不曰舜猶己也歟夫是之謂一德一心自今觀之則益之言可以謂之沮壞成事而禹之事爲逗留君命矣然古之君臣各相體悉如此古人立功所以易而後丗成事所以難也語仲素曰某嘗有數句教學者讀書之法云以身體之以心驗之從容黙㑹於幽閑靜一之中超然自得於書言象意之表此蓋某所爲者如此又云西銘㑹古人用心要處爲文正如杜順作法界觀様仲素問盡其心者知其性如何是盡心底道理曰未言盡心須先理㑹心是何物又問曰心之爲物明白洞逹廣大靜一􅀂體㑹得了然分明然後可以言盡未理㑹得心盡箇甚能盡其心自然知性不用問人大抵須先理㑹仁之爲道知仁則知心知心則知性是三者􅀄無異也横渠作西銘亦只是要學者求仁而巳論及陽城事謂永叔不能純夫取之其言曰陽城蓋有待而爲者也後丗猶責之無巳其不成人之美亦甚哉此論似近厚曰陽城固可取然以爲法則不可裴延齡之欲相其來非一朝一夕何不救之於漸乎至於陸贄之貶然後論延齡之姦佞無益矣觀古人退小人之道不然易之姤卦曰女壯勿用取女夫姤一隂生未壯也而曰壯者生而不巳固有壯之理也取女則引而與之齊也引而與之齊則難制矣隂者小人之象也小人固當制之於漸也故當隂之生則知其有壯之理其有壯之理則勿用取女可也是以姤之􅀄爻曰繫于金柅貞吉有攸往見凶金柅止車之行也隂之􅀄動必有以柅之其制之於漸乎蓋小人之惡制之於未成則易制之於巳成則難延齡之用事權傾宰相雖不正名其爲相其惡自􅀂也何更云待其爲相然後取白麻壞之耶然城之所爲當時所難能也取之亦是但不可以爲法耳􅀛山先生語録卷第三
