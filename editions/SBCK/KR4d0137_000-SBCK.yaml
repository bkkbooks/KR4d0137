front:
  text: 􅀛山楊先生語録後録上楊時於新學極精今日一有所問能盡知其短
  hash: sha256:95de0f95ee3039c33e73166c3a2a772342128e3538a6d97db99eb9bb59892fb1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0137_SBCK_000-1a}
body:
  text: 而持之介甫之學大抵支離伯淳嘗與楊時讀了數篇其後盡能推􅀋以通之見程氏遺書伊川荅楊中立論西銘中立書尾云判然無疑伊川曰楊時也未判然見祁寛所記尹公語舊在二先生之門者伯淳最愛中立正叔最愛定夫二人氣象亦相似見上蔡語録􅀛山楊先生語録後録上􅀛山楊先生語録後録下宋興百有餘年四方無虞風俗敦厚民不識干戈有儒生於江南髙談詩書自擬伊傅而實竊佛老之似濟非鞅之術舉丗風動雖巨德故老有莫能燭其姦其說一行而天下始紛紛多事反理之評詭道之論日以益熾邪慝相承卒兆裔夷之禍考其所致有自來矣靖康􅀄􅀛山楊公任諌議大夫國子􅀕酒始推本論奏其學術之謬請追奪王爵罷去配饗雖當時餘黨猶夥公之說未得盡施然大統中興論議一正到于今學者知荆舒禍本而有不屑焉則公之息邪說距詖行放滛辭以承孟氏者其功顧不大哉是宜列之學宫使韋布之士知所尊仰而况公舊所臨流風善政之及祀事其可闕乎瀏陽實潭之屬邑紹聖􅀄公嘗辱爲之宰歳饑發廩以賑民而部使者以催科不給罪公公之德於邑民也深矣後六十有六年建安章才邵來爲政􅁣然念風烈咨故老葺公舊所爲飛鴻閣繪像於其上以示後學以慰邑人之思去而不忘也又六年貽書俾熹記之熹生晚識陋何足以窺公之藴惟公師事河南二程先生得中庸鳶飛魚躍之傳於言意之表踐履純固卓然爲一丗儒宗故見於行事深切著明如此敢表而出之庶幾慕用之萬一云爾飛鴻閣􅀞像記􅀛山天資髙朴實簡易然所見一定更不須窮究某嘗謂這般人皆是天資出人非假學力如􅀛山極是簡易衣服也只據見定終日坐在門限上人犯之亦不校其簡易率皆如此喜怒哀樂未發􅀛山敬而無失之說甚好問􅀛山云消息盈虚天且不能􅁀爲之去小人亦不可驟如何曰只看時如何不可執天亦有迅雷風烈之時又言􅀛山先生年少未見伊川時先去看莊列等文字後來雖見伊川然而此念熟了不覺時發出來游定夫尤甚羅仲素時復亦有此意􅀛山往來太學過廬山見常緫緫亦南劒人也與􅀛山論性謂本然之善不與惡對後胡文定得其說於􅀛山至今諸胡謂本然之善不與惡對與惡爲對者又别有一善常緫之言􅀄未爲失􅀂論本然之性只一味是善安得惡來人自去壞了便是惡旣有惡便與善爲對今他却說有不與惡對底善又有與惡對底善如近年郭子和九圗便是如此見識上面書一圈子寫性善字從此牽下兩邊有善有惡或云恐文定當來未甚有差後來傳襲節次訛舛曰看他說善者賛美之詞不與惡對巳自差異理不外物􅀂以物便爲道則不可如􅀛山云寒衣饑食岀作入息無非道伊尹耕於有莘之野以樂堯舜之道夫堯舜之道豈有物可玩哉即耕於有莘之野是巳恁地說却有病物只是物所以爲物之理乃道也􅀛山言天命之謂性人欲非性也天命之善本是無人欲不必如此立說胡子知言云天理人欲同體而異用同行而異情自是他全錯看了問橫浦語録載張子韶戒殺不食蠏髙抑崇相對故食之􅀛山云子韶不殺抑崇故殺不可抑崇退􅀛山問子韶周公何如對曰仁人曰周公驅猛獸兼夷狄㓕國者五十何嘗不殺亦去不仁以行其仁耳先生云此特見其非不殺耳猶有未盡須知上古聖人制爲罔􅅈佃漁食禽獸之􅁏但君子逺庖厨不􅁀殄天物須如此說方切事情草堂先生及識元城劉器之楊􅀛山􅀛山之岀時巳七十歳却是從蔡攸薦岀他那時却是覺得這􅁁扶持不得事􅀔也極故要附此邊人所以薦􅀛山􅀄縁蔡攸與蔡子應說令其薦舉人才答云太師用人甚廣又要討甚麽人曰縁都是􅀔利之徒恐緩急不可用公知有山林之人可見告他便說某只知郷人鼔山下張觷字柔直其人甚好蔡攸曰家間子姪未有人教可屈他來否此人即以告張張即從之及教其子姪儼然正師弟子之分異於前人得一日忽開諭其子弟以奔走之事其子弟駭愕即告之曰􅀂有賊來先及汝等汝等能走乎子弟益驚駭謂先生失心以告老蔡老蔡因悟曰不然他說得是蓋京父子此時要喚許多好人岀巳知事變必至即請張公叩之張言天下事􅀔至此巳不可救􅀔只得且收舉个賢人岀以爲緩急􅀝仗耳即令張公薦人張公於是薦許多人􅀛山在一人之數今􅀛山墓誌云㑹有告大臣以天下將變宜急舉賢以存國於是公岀謂此張後爲某州縣丞到任即知虜人入㓂必有自海道至者於是買木爲造舡之備踰時果然虜自海入㓂科州縣造舟倉卒擾擾油􅁅木材莫不踊貴獨張公素備不勞而辦以此見知於帥憲即辟知􅀯劒㑹葉鐡入㓂民人大恐他即告諭安存之即率城中諸富家令岀錢米沽酒買肉爲蒸糊之􅀋遂分民兵三替逐替燕犒酒食授以兵器先一替岀城與賊接戰即犒第二替岀先替未倦而後替即得助之民大喜遂射殺賊首冨民中有識葉鐡者即厚勞之忽令執兵只今執長鎗上懸白旗令見葉鐡即以白旗指向之衆人上了弩即其所指而發遂中之後都統任某欲爭功亦讓與之其餘諸盗却得都統之力放賊之叔父以成反間論及􅀛山先生曰􅀛山彈蔡京也是只不迅速林擇之曰􅀛山晚岀一節亦不是先生曰也不干晚岀事􅀂岀來做得事也無妨他性慢看道理也如此平常處看得好緊要處却放緩了做事都渙散無倫理將樂人性急麄率􅀛山却恁寛平此是間岀然其麄率處依舊有土風在或問􅀛山晚年岀處不可曉其召也以蔡京然在朝亦無大建明曰以今觀之則可以追咎當時無大建明􅀂自家處之不知當時所當建明者何事或云不過擇將相爲急曰也只好說不知當時事􅀔如何擇將相固是急然不知當時有甚人可做當時將只說种師道相只說李伯紀然固皆嘗用之矣又况自家言之彼亦未便見聽據當時􅀔亦無可爲者不知有大聖賢又如何耳問􅀛山晚年岀得是否曰岀如何不是只看岀得如何當􅀄􅀂能有所建明而岀則勝於不出曰渠用蔡攸薦亦未是曰亦不妨但當時事急且要速得一好人岀來救之只是岀得來不濟事耳觀渠爲諌官將去猶惓惓於一對巳而不得對及觀其所言第一正心誠意意欲上推誠待宰執第二理㑹東􅀯綱運當時宰執皆庸繆之流待亦不可不待亦不可不告以窮理而告以正心誠意賊在城外道途正梗縱有東􅀯綱運安能逹所謂雖有粟安得而食諸當危急之時人所屬望而著數乃如此所以使丗上一等人􅀏儒者以爲不足用正坐此耳問圍城時李伯紀如何曰當時不使他更誰使士氣至此蕭索無餘他人皆不肯向前惟有渠尚不顧死且得􅀝仗之問姚平仲刼寨事是誰發曰人皆歸罪伯紀此乃是平仲之謀姚种皆西方將家師道巳立功平仲恥之故欲以竒功取勝之刼不勝欽廟親批令伯紀䇿應或云當時􅀂再刼可勝但無人敢主張問种師中河東之死或者亦歸罪伯紀曰不然嘗親見一將官說師中之敗乃是爲流矢所中非戰敗渠親見之甚可怪如种師道方爲樞密朝廷􅀝重遽死此亦是氣數伯紀管御營欽廟授以空名告身自觀察使以下使之自􅀘師道只用一二小使臣誥御批云大臣作福作威漸不可長及遣救河東伯紀度􅀔不可辭不行御批云身爲大臣遷延避事是時許崧老爲右丞與伯紀善書杜郵二字與之伯紀悟遂行當危急時反爲姦臣所使豈能做事問种師道果可依仗否曰師道爲人口訥語言不能岀上問和親曰臣執干戈以衛社稷不知其他遂去不能反覆力執大抵是時在上者無定說朝變夕改縱有好人亦做不得事道夫問􅀛山晚歳一岀爲士詬罵果有之否曰他當時一岀追奪荆公王爵罷配饗夫子且欲毀劈三經板士子不樂遂相與聚問三經有何不可輙欲毀之當時􅀛山亦謹避之問或者疑􅀛山此岀爲無􅀘於事徒爾紛紛或以爲大賢岀處不可以此議如何曰􅀛山此行固是有病但只後人又何曽夢到他地位在惟胡文定以柳下恵援而止之而止比之極好􅀛山之岀人多議之惟胡文定公之言曰當時􅀂能聽用决須救得一半此語最公蓋􅀛山當此時雖􅀒重名亦無殺活手叚􅀂謂其懷蔡氏汲引之恩力庇其子至有謹勿擊居安之語則誣矣幸而此言岀於孫覿人自不信坐客問􅀛山先生立朝事先生曰胡文定論得好朝廷􅀂委呉元忠輩推行其說决須救得一半不至如後來狼狽然當時國􅀔巳如此虜􅀄退後便須急急理㑹如救焚拯溺諸公今日論蔡京明日論王黼當時姦黨各已行遣了只管理㑹不休擔閣了日子如呉元忠李伯紀向來亦是蔡京引用免不得略遮庇只管喫議論􅀛山亦􅀍孫覿軰窘擾􅀛山銘誌不載髙麗事他引歐公作梅聖俞墓誌不載布文詩事辨得甚好孰能識車中之狀意欲施事見韓詩外傳伯夷微似老子胡文定作􅀛山先生墓誌主張􅀛山似柳下惠看來是如此􅀛山與廖尚書說義利事廖云義利却是天理人欲􅀛山曰只怕賢錯認以利爲義也後來􅀍召主和議果如􅀛山說廖􅀄舉鄭厚與某人可見其賢此二人二人皆要上恐脫不字主和議及廖􅀍召却不問此二人却去葉孝先商量及爲中丞又薦鄭轂然廖終與秦不合而岀但􅀄不能别義利之分亦是平時講之不熟也鄭博士某舊見之年七十餘云嘗見上蔡先生先人甚敬之國說胡珵德輝所著文字問德輝何如人曰先友也􅀳陵人曽從􅀛山游故所記多􅀛山說話能詩文墨􅀠皆精好嘗見先人館中唱和一卷惟胡詩特佳趙忠簡公當國與張嵲巨山同爲史官及趙公去位張魏公獨相以爲元祐未必全是熈豐未必全非遂擢何掄仲李似表二人爲史官胡張所修史皆摽岀欲改之胡張遂求去及忠簡再入相遂去何李依舊用胡張爲史官成書奏上弄得都成私意􅀛山雜􅀶是讀多少文字􅀛山楊先生語録後録下後學天台呉堅刋于福建􅈇治
