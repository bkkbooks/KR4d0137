  text: 龜山先生語録卷第四
  hash: sha256:b6c5894f430852eaa21c05c9a583d2ea169cb84b43ddd526da89e7d1be785cfc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0137_SBCK_004-1a}
body:
  text: 餘杭所聞神宗賜金荆公荆公即時賜蔣山僧寺爲常住了翁云嘗見人說以此爲曠古所難其實能有多少物人所以難之蓋自其眼孔淺耳曰荆公作此事絶無義理古者人君賜之果尚懷其核懷核所以敬君賜也所賜金義當受則受當辭則辭其可名而受之而施之僧寺乎是賤君賜也金可賤君賜不可賤書曰人不易物雖德其物若於義當受而家巳足不願藏之家而班諸昆弟之貧者則合禮矣眞宗問李文靖曰人皆有宻啓而卿獨無何也對曰臣待罪宰相公事則公言之何用宻啓夫人臣有宻啓者非讒即佞臣常惡之豈可效尤曰祖宗時宰相如此天下安得不治因說唐明皇欲取石堡城王忠嗣不可李光弼勸之忠嗣曰石堡城非殺數萬人不可取忠嗣今不奉詔縱得罪天子不過以一將軍歸宿衛其次不過黔中上佐忠嗣豈以一官易數萬人之命哉忠嗣如此極知輕重曰忠嗣意甚善然不能無過夫人臣之事君苟利於國死生以之不應以官職之不足顧計爲言也謂官職之不足道此猶以利言若是古之賢聖處事只論是非而巳如以利言則禍患有大於一將軍宿衞黔中上佐是將從之乎惜乎忠嗣之處此未盡也然則其言合如何曰當云今得罪主上不過一身之利害危辱耳豈可以一身之重而輕數萬人之命哉如此則其言無病因言眞宗朝有百姓争財以狀投匭其語有比上德爲桀紂者比奏御眞宗令宫中錄所訴之事付有司根治而匿其狀曰百姓意在争財其實無他若并其狀付有司非惟所訴之事不得其直必須先按其指斥乘輿之罪百姓無知亦可憐也曰祖宗慈仁如此書曰小人怨汝詈汝則皇自敬德祖宗分明有此氣象天下安得而不治言眞宗時監司有以羡餘進奉者議賞内批云國家賦有常數安得羡餘果有之若非入時大量即是出時减刻安可賞因曰祖宗不爲文章然似此語言萬丗可傳誦也謂揚子雲作太元只據他立名便不是旣定却三方九州二十七部八十一家不知如何相錯得八卦所以可變而爲六十四者只爲可相錯故可變耳惟相錯則其變岀於自然也問正叔先生云或說易曰乾天道坤地道正是亂說曰乾坤非天地之道邪曰乾豈止言天坤豈止言地又言問乾坤不止言天地而乾卦多言天坤卦多言地何也曰本乎天者親上本乎地者親下則各從其類也乾卦言天坤卦言地只爲語其類耳如說卦於乾雖言爲天又言爲金爲玉以至爲駁馬良馬爲木果之類豈盡言天故繫辭曰伏羲始作八卦以通神明之德以類萬物之情若此者所謂類萬物之情也只如說卦所類亦不止此爲之每發其端使後之學易者觸類而求之耳蓋作易者仰則觀象於天俯則觀法於地觀鳥獸之文與地之冝近取諸身逺取諸物故孔子繫辭推明之曰此卦於天文地理則爲某物於鳥獸草木則爲某物於身於物則爲某物各以例舉不盡言也學者觸類而求之則思過半矣不然說卦所叙何所用之論橫渠曰正叔先生亦自不許他曰先生嘗言自孟子之後無他見識何也曰如彼見識秦漢以來何人到得論與叔曰正叔先生嘗言與叔只是守橫渠說更不肯易才東邊扶得起又倒從西邊去此二人爲常有疑焉故問謂孔子曰自古皆有死民無信不立今天下上自朝廷大臣下至州縣官吏莫不以欺誕爲事而未有以救之只此風俗怎抵當他謂學校以分數多少校士人文章使之胷中日夕只在利害上如此作人要何用謂正叔云古之學者四十而仕未仕以前二十餘年得盡力於學問無他營也故人之成材可用今之士十四五以上便學綴文覔官豈嘗有意爲已之學夫以不學之人一旦授之官而使之事君長民治事宜其效不如古也故今之在仕路者人物多凡下不足道以此謂毛富陽云士人如張孝伯眞可謂恬於進取者因說張孝伯好曰愿人也然終無使他處若據此人天資直是美惜其少學耳問孝伯樂正子之流否曰非也彼巳無進爲撫丗之意若樂正子將爲政於魯孟子聞之爲之喜而不寐孟子不徒喜也蓋望其能有爲也如孝伯恐不足以當人望只是一箇愿愨可尚耳問愿與善人如此其異乎曰善人爲邦百年亦可以勝殘去殺豈愿者之事因又問九德曰愿而恭蓋愿必濟以恭然後能成德也然愿者自應恭謹何謂相濟曰愿者自爲之人耳如孟子所謂責難於君愿做不得責難於君愿特貌恭而巳謂與季常言王氏只是以政刑治天下道之以德齊之以禮之事全無他日季常曰細思之實如公言但道以德齊以禮之事於今如何做曰湏有㑹做只爲而今不用着此等人若是他依本分㑹底必有道理君子陽陽之詩序以謂閔周蓋言君子至於相招爲禄仕全身逺害於周不足刺也可閔而巳夫賢人才士苟以得禄養父母活妻孥爲事而無致君行道之心誰與爲治此所以亂益亂也尚足刺乎二南爲王道之基本只爲正家而天下定故也問共姜之父母不知夫婦之義不當責邪曰以共姜之自誓不嫁爲守義則彼欲奪而嫁之者爲不義可知取此則去彼矣作文字要只說目前話令自然分明不驚怛人不能得然後知孟子所謂言近非聖賢不能也問父子之間不責善固是至於不教子不亦過乎曰不教不親教也雖不責善豈不欲其爲善然必親教之其勢必至於責善故孔子所以逺其子也曰使之學詩學禮非教乎曰此亦非強教之也如學詩學禮必欲其學有所至則非孔子所以待其子故告之學則不可不告及其不學亦無如之何因論特旨曰此非先王之道先王只是好生故書曰好生之德洽于民心爲天子豈應以殺人爲已任孟子曰國人皆曰可殺然後殺之曰國人殺之也謂國人殺之則殺之者非一人之私意不得巳也古者司㓂以獄之成告于王王命三公參聽之三公以獄之成告于王王三宥然後致刑夫宥之者天子之德而刑之者有司之公天子以好生爲德有司以執法爲公則刑不濫矣若罪不當刑而天子必刑之寧免於濫乎然此事其漸有因非獨人主之過使法官得其人則此弊可去矣舜爲天子若瞽叟殺人皐陶得而執之舜猶不能禁也且法者天下之公豈宜徇一人之意嘗恠張釋之論渭橋犯蹕事宜罰金文帝怒釋之對曰法者天子所與天下公共也今法如是更重之是法不信於民也此說甚好然而曰方其時上使人誅之則巳以謂爲後丗人主開殺人之端者必此言也夫法旣曰天子與天下公共則得罪者天子必付之有司安得擅殺使當時可使人誅之今雖下廷尉越法而誅之亦可也因論爲政曰書云母忿疾于頑若忿疾于頑便失之嚴嚴便非居上之道問有人問正叔周公欲以身代武王之死其知命乎正叔曰只是要代兄死豈更問命此語如何曰是也曰聖人不應不知天理天理旣不然而必行之其誠不幾於無物否曰聖人固知天理然只爲情切猶於此僥倖萬一也故至誠爲之又曰金縢之事有之然其間亦有言語可疑者如云元孫不若旦多才多藝聖人似不應如此說因言正叔云人言沛公用張良沛公豈能用張良張良用沛公耳良之從沛公以爲韓報秦也旣㓕秦於是置沛公關中辭歸韓而巳見沛公有可以取天下之勢故又從之巳取天下便欲棄人間事從赤松遊良不爲髙祖之臣可見矣此論甚好以前無人及此曰此論亦未盡張良蓋終始爲韓者方沛公爲漢王之國遣良歸韓良因說沛公燒絶棧道此豈復有事漢之意及良歸至韓聞項羽以良從漢王故不遣韓王成之國與俱東至彭城殺之先是良說項梁以韓諸公子横陽君成可立梁遂使良求韓成立爲韓王良爲韓司徒良以成見殺之故於是又間行歸漢其意蓋欲爲韓報項羽也至漢髙祖用其謀巳破項羽平定天下從髙祖西都關中於是如有導引辟榖從赤松子之語蓋爲韓報仇之心於是方巳故也據良先說髙祖絶棧道然後歸韓此亦似有意使韓王成若在良輔之并天下未可知良意以謂可與之平天下者獨髙祖髙祖旣阻蜀不出其他不足慮矣不幸韓王成爲項羽所殺故無以自資而卒歸漢也如髙祖亦自用張良不盡良之術亦不止於此湏更有事在其臣髙祖非其心也不得巳耳因言曾與季常論鑄鼎云鼎之爲說左傳曾道來後之人得以藉口者以此爾然使如丘明之說不誣亦不過象物之形百物而爲之備使民知神姦而巳後之人主用方士厭勝祈禳之法此何所據丘明云成王定鼎于郟鄏卜丗卜年天所命也然而洛誥周公所作當時所爲無不載者若鼎之爲物乃社稷重噐當載而莫之載者何也鼎鑄于夏時夏之法制莫詳於禹貢之書豈有九牧貢金成此重噐欲以恊上下承天休而禹貢曾無一語及之乎易六十四卦其在鼎也取象爲備如丘明之說畧無毫髮相類而况於後之紛紛者乎故凡事無徴者皆不可爲也後丗如曹參可謂能克已者攻堅䧟敵是其所長至其治國爲天下乃以清静無爲爲事氣質都變了因論寒士乍得官非不曉事便是妄作大抵科舉取人不得間有得者自是豪傑之士因科舉以進耳問李德𥙿言公卿大夫家子弟可用進士未必可用此論不偏否曰德𥙿爲此論至今人以爲偏當時人以德𥙿用資䕃進身不由科舉故爲此論此最無謂以德𥙿之才應唐之科目極容易自是不爲耳且資䕃得官與進士得官孰爲優劣以進士爲勝以資䕃爲慊者此自後丗流俗之論至使人耻受其父祖之澤而甘心工無益之習以與孤寒之士角務於埸屋僥倖一第以爲榮是何見識夫應舉亦自寒士無禄不得巳藉此進身耳如得巳何用應舉范堯夫最有見識然亦以資䕃與進士分優劣建言於有無出身人銜位上帶左右字不可謂無所蔽也其言曰欲使公卿家子弟讀書耳此意甚善但以應舉得官者爲讀書而加獎勸焉可也彼讀書者應舉得官而止耳豈直學道之人至如韓持國自是經國之才用爲執政亦了得不可以無岀身便廢其執政之才曰堯夫所別異者莫非此等人否曰執政不是合下便做亦自小官以次遷之如後來呉坦求等在紹聖中𬒳駮了博士以無岀身故也彼自布衣中朝廷以其有學行賜之爵命至其宜爲博士乃復以爲無岀身奪之此何理也資䕃進士中俱有人惟其人用之加一右字亦自沮人爲善朝廷作事若要上下小大同心同德湏是道理明蓋天下只是一理故其所爲必同若用智謀則人人岀其私意私意萬人萬様安得同因舉舊記正叔先生之語云公則一私則萬殊人心不同猶靣其蔽於私乎自孟子没王道不傳故丗無王佐之才旣無王佐之才故其治效終不如古若要行道才說計較要行便不是何故自家先負一箇不誠了安得事成劉向多少忠於漢只爲做計較太甚才𬒳看破手足俱露是甚模様言季常曾問揚雄來應之曰不知聖人何足道季常駭之淵因語後丗學道不明爾𬒳流俗之蔽只如他取揚雄亦未能免流俗也卓乎天下之習不能蔽也程正叔一人而巳觀正叔所言未嘗務脫流俗只是一箇是底道理自然不墮流俗中先生曰然觀其論婦人不再適人以謂寧餓死若不是見得道理分明如何敢說這様話南都所聞已丑四月自京都回至七月薛宗博請諸職事㑹茶曰禮豈岀於人心如此事本非意之所欲但不得巳耳老子曰禮者忠信之薄荀子曰禮起於聖人之僞眞箇是因問之曰所以召茶者何謂薛曰前後例如此近日以事多與此等稍踈闊心中打不過湏一請之曰只爲前後例合如此心中自打不過豈自外來如云辭遜之心禮之端亦只是心有所不安故當辭遜只此是禮非僞爲也問易曰乾坤其易之門耶所謂門莫是學易自此入否曰不然今人多如此說故有喻易爲屋室謂其入必有其門則乾坤是也爲此言者只爲元不曉易夫易與乾坤豈有二物孰爲内外謂之乾坤者因其健順而命之名耳乾坤即易易即乾坤故孔子曰乾坤毀則無以見易蓋無乾坤則不見易非易則無乾坤謂乾坤爲易之門者隂陽之氣有動靜屈伸爾一動一靜或屈或伸闔闢之象也故孔子又曰闔户謂之坤闢户謂之乾所謂門者如此老子曰天地之間其猶槖籥乎夫氣之闔闢往來豈有窮哉有闔有闢變由是生其變無常非易而何小蔡云輕清者上爲天神應之爲乾重濁者下爲地神應之爲坤似此解釋夢也未夢見易大抵看易湏先識他根本然後有得夫易求之吾身斯可見矣豈應外求張横渠於正蒙中曾畧說破云乾坤之闔闢岀入息之象也非見得徹言不能及此某舊曾作明道哀辭云通闔闢於一息耶尸者其誰蓋言易之在我也人人有易不知自求只於文字上用功要作何用此等語若非以見問終說不到如某與定夫相㑹亦未嘗及從可某常疑定夫學易亦恐岀他荆公未得荆公於易只是理㑹文義未必心通若非心通縱說得分明徹了不濟事易不比他經湏心通始得如龔深父說易元無所見可憐一生用功都無是處問乾坤即隂陽之氣否曰分明說乾陽物坤隂物旣是隂陽又曰乾坤何也曰乾坤正言其健順爾識破本根湏是知體同名異自然意義曉然又云天尊地卑乾坤定矣乾坤本無體天地之位定則乾坤斯定不有天地乾坤何辨問天地即輕清重濁之氣升降否曰然天地乾坤亦是異名同體其本一物變生則名立在天成象在地成形亦此物也但因變化出來故千態萬變各自陳露故曰在天成象在地成形變化見矣變化神之所爲也其所以變化孰從而見之因其成象於天成形於地然後變化可得而見焉因云舊常解此義云無象無形則神之所爲隱矣有象有形變化於是乎著因問乾坤毀則無以見易如此則易不屬無矣曰昜固非無張橫渠深闢老子有無之論莫有見於此否曰然才說無便成斷㓕去如釋氏說空又曰非空到了費力聖人只說易最爲的當因言孟子論養氣到此方見有功於前聖曰如孟子者方是能曉易如說必有事焉非見得分明此説如何撰得又問正叔先生以必有事焉而勿正爲一句某嘗疑勿正心似非聖賢語意及見此乃知正叔先生讀書有力曰事說勿正則可心說勿正則不可正叔讀書直是不草草他議論方是議論伯思言正叔以至大至剛以直爲一句養而無害爲一句或云伯淳曾言至大至剛之氣湏以直養正叔堅云先兄無此說若曰以直養而無害莫不妨曰嫌於將一物養一物不如養而無害較渾全他門說話湏是與他思量體究方見好處問易有太極莫便是道之所謂中否曰然若是則本無定位當處即是太極耶曰然兩儀四象八卦如何自此生曰旣有太極便有上下有上下便有左右前後有左右前後四方便有四維皆自然之理也人君所以御其臣只有一箇名分不可易名分旣正上下自定雖有㓜冲之主在上而天下不亂若以智籠臣下智有時而困則彼不爲用矣其勢湏至於誅殛之然後巳觀西漢之君臣多尚權謀當時大臣少有能全身者蓋以此某舊作十論曾有一篇及此朝廷上做事湏先令學術粗明然後可以爲不然人人說一般話如何做得事王章論王鳯當時人君非不悟但以力弱𬒳王鳯才理㑹起便推從王章身上去章終𬒳禍人君如此誰敢與他放脚手做事正叔在經筵潞公入劄子要宰相以下聽講講罷諸公皆退晦叔云可謂稱職堯夫云眞侍講又一人云不知古人告其君還能如此否只爲諸公欽服他他又多忤人所以後來謗生因說正叔經筵開陳故及此所論列有處記圎覺經言作止任㓕是四病作即所謂助長止即所謂不芸苗任㓕即是無事解經大抵湏得理㑹而語簡舊嘗解易簡而天下之理得云行其所無事不亦易乎一以貫之不亦簡乎如是則天下之理得矣又言行其所無事一以貫之只是一箇自然之理繫辭中語言直有難理㑹處今人注解只是亂說問正叔云詩非聖人所作當時所取只以其止於禮義至如比其君狡童碩䑕則巳甚其說如何曰此理舊疑來因學春秋遂知其意春秋書突之奔及其歸皆曰鄭伯突其書忽止曰鄭忽蓋不以忽爲君故也不以爲君故詩人目之爲狡童觀褰裳之詩云狂童恣行國人思大國之正已其詩曰子惠思我褰裳渉溱言人心巳離若大國見正國人必從之矣人之視忽如此尚誰以爲君若猶以爲君則比之狡重誠不可矣碩䑕如何曰魏之重斂至使人欲適彼樂國則人心之離亦可見矣又云人心合而從之則爲君離而去之則爲獨夫學者若不以敬爲事便無用心處致一之謂一無適之謂一人言春秋難知其實昭如日星孔子於五經中言其理於春秋著其行事學者若得五經之理春秋誠不難知又云伯淳先生嘗有語云看春秋若經不通則當求之傳傳不通則當求之經某曾問之云傳不通則當求之經何也曰只如左氏春秋書君氏卒君氏乃惠公繼室聲子也而公羊春秋則書曰尹氏傳云大夫也然聲子而書曰君氏是何義湏當以尹氏爲正此所謂求之經問乾坤用九六荆公曰進君子退小人固非自然之理而正叔云觀河圖數可見何也曰此多有議論少有分明繫辭分明說云參天兩地而倚數九叄天六兩地也因言了翁說易多以一字貫衆義如何曰易卦用字有如此者有不如此者如云習坎重險也又言天險地險王公設險則險爲善睽乖也又言天地睽而萬物通男女睽而其志同則乖爲善蓋一字兩用字非此類則不可如師是師旅之師豈可說爲師友之師以來書云爾故及之形色天性也有物必有則也物即是形色即是天性唯聖人然後可以踐形踐履也體性故也蓋形色必有所以爲形色者是聖人之所履也謂形色爲天性亦猶所謂色即是空毗陵所聞辛卯七月十一日自沙縣來至十月去劉元承言相之無所不用其敬嘗掛眞武畫像於帳中其不欺暗室可知曰相之不自欺則固可取然以神像置帳中亦可謂不智曰何以言之曰果有眞武則敬而逺之乃所謂智帳中卧之處至䙝之所也何可置神像君子喻於義小人喻於利所謂喻於義則唯義而巳自義之外非君子之所當務也夫然後所守者約如孟施舎知守氣可謂約矣所以不及曾子者以曾子唯義之從故也或曰文王所謂至德以不累於髙名厚利故也所謂不累於厚利者三分天下有其二以服事啇所謂不累於髙名者有其二而弗辭曰如是則武王之取天下以爲累於利而可乎孟子之言曰取之而燕民恱則取之古之人有行之者武王是也取之而燕民不恱則勿取古之人有行之者文王是也此論盡矣蓋文王所謂至德者三分天下有其二矣以取天下何難之有而文王勿取者視天而巳𥘉無用心於其間也夫是之謂至德舜在側微堯舉而試之愼徽五典則五典克從納于百揆則百揆時叙賔于四門則四門穆穆以至以天下授之而不疑觀其所施設舜之所以爲舜其才其德可謂大矣宜非深山之中所能乆處而爲舜者當堯未之知方且飯糗茹草若將終身若使今人有才氣者雖不得時其能自巳其功名之心乎以此見人必能不爲然後能有爲也非有爲之難其不爲尤難矣只如伊尹耕於莘非湯三聘則必不起諸葛亮卧草廬非先主三顧亦必不起非要之也義當然也以諸葛之智尚知如此又况不爲諸葛者乎然則居畎畒之中而以天下爲巳憂可也或不知消息盈虚之運犯分妄作豈正理哉舜可謂無爲有天下𥘉無所與其任九官去四凶視其功罪如何舜無毫髮之私也劉向之所謂忠可以爲戒不幸似之非所以全德大抵人能住得然後可以有爲才智之士非有學力却住不得孟子言大人正已而物正荆公却云正已而不期於正物則無義正已而必期於正物則無命若如所論孟子自當言正已以正物不應言正已而物正矣物正物自正也大人只知正已而巳若物之正何可必乎惟能正已物自然正此乃篤恭而天下平之意荆公之學本不知此張茂則宦官之賢者也元祐間曾請諸公啜茶觀畫惟正叔不往辭之曰某素不識畫亦不喜茶如正叔眞箇不去得他人到此湏容情與他去或問正叔先生云邵堯夫易數至今無傳當時何不問他看如何先生曰若是公等湏打不過必問他字說所謂大同於物者離人焉曰揚子言和同天人之際使之無間不知是同是不同若以爲同未嘗離人又所謂性覺眞空者離人焉若離人而之天正所謂頑空通揔老言經中說十識第八庵摩羅識唐言白淨無垢第九阿頼耶識唐言善惡種子白淨無垢即孟子之言性善是也言性善可謂探其本言善惡混乃是於善惡巳萌處看荆公蓋不知此蕭山所聞壬辰五月又自沙縣來至八月去横渠言性未成則善惡混亹亹而繼善者斯爲善矣惡盡去則善因以亡故舎曰善而曰成之者性伯思疑此以問公曰不知横渠因何如此說據此說於易之文亦自不通却令伯思說伯思言善與性皆當就人言繼之爲說如子繼父成乃無所虧之名矣若非人即不能繼而成之曰不獨指人言萬物得隂陽而生皆可言繼之善亦有多般如乾之四德有仁義禮智之不同後人以配四時若如四時則春固不可爲秋冬固不可爲夏其實皆善也元者特善之長也固岀於道故曰繼之者善性則具足圎成本無虧欠要成此道除是性也今或以萬物之性爲不足以成之蓋不知萬物所以賦得偏者自其氣禀之異非性之偏也孔子曰天地之性人爲貴人之性特貴於萬物耳何常與物是兩般性伊川語録云以忠恕爲一貫除是曾子說方可信若他人說則不可信如何曰明道說却不如此問明道說曰只某所著新義以忠恕爲曾子所以告門人便是明道說問中庸發明忠恕之理以有一貫之意如何曰何以言之曰物我兼體曰只爲不是物我兼體若物我兼體則固一矣此正孟子所謂善推其所以爲者乃是參彼已爲言若知孔子以能近取譬爲仁之方不謂之仁則知此意曰即已即物可謂一否曰然孟子言孔子集大成曰始條理者智之事終條理者聖之事夫仁且智斯之謂聖今以聖之事或不足於智何也曰聖則具仁智矣但此發明中處乃智之事聖則其所至也未必皆中曰孟子曰智之於賢者則智但可語賢者若乃大而化之則雖智而忘其智矣如所謂從容中道縱心不踰矩智何足以名之曰如伊尹伯夷柳下惠只於清任和處中其他則未必皆中則其智容有所不周智便是用處曰用智莫非所以言聖人若曰行其所無事則由智行非行智者也曰觀此却是以智爲妙曰聖人之於智見無全牛萬理洞開即便是從容處豈不謂之妙若伯夷伊尹柳下惠於清任和處已至聖人但其佗處未必皆中其至與孔子同而其中與孔子異只爲不能無偏故也若隘與不恭其所偏歟充類至義之盡言不可以謂之盗也獵較猶可則取於民猶禦者受其所賜何爲不可柳下惠不以三公易其介此與聖人之和互相發耶乃所以爲和耶曰若觀其和疑若不介故此特言之曰何以知其介曰只不卑小官之意便自可見如柳下惠之才以爲大官何所不可而樂於爲小官則其剛介可知矣中心安仁者天下一人而巳如伯淳莫將做天下一人看曰固是東坡言直方大云旣直且方非大而何曰直方蓋所以爲大然其辭却似不逹孔子云敬義立而德不孤德不孤乃所謂大德不孤則四海之内皆兄弟之意夫能使四海之内皆兄弟此所以爲大也東坡云萬物覩乃是萬物欲見之言欲見之便非聖人作而萬物覩如日在天萬物便見聖人惟恐不作作則即時覩矣作與覩同時事也啐啄同時乾之九三獨言君子蓋九三人之位也履正居中在此一爻故文言於九四則曰上不在天下不在田中不在人於九三止言上不在天下不在田而巳其曰君子行此四德者蓋乾之所謂君子也曰所以爲君子者乃行此德之人耳上治如所謂正已也讀書湏看古人立意所發明者何事不可只於言上理㑹如萬章問象日以殺舜爲事孟子答舜所以處之之道其意在說聖人誠信無僞此尤不可不知若從枝葉上理㑹只如象欲使二嫂治朕棲之語此豈可信堯在上不容有此等人若或有之不知則巳然堯於舜旣以女妻之其弟如此豈有不知知則治之矣若使死可以救丗則雖死不足恤然豈有殺賢人君子之人君子能使天下治以死救天下乃君子分上事不足恠然亦湏死得是孟子曰可以死可以無死死傷勇如必要以死任事爲能外死生是乃以死生爲大事者也未必能外生死鄭季常問孔子去魯曰遲遲吾行也去父母國之道也然而燔肉不至不脫冕而行豈得爲遲遲曰孔子欲去之意蓋乆待燔肉不至而行不欲爲苟去乃所謂遲遲若他國則君不用便當去豈待燔肉之不至然後行曰何以見其去他國之速曰衛靈公問陳一語不契明日遂行孟子所言皆精粗兼備其言甚近而妙義在焉如龐居士云神通并妙用運水與般柴此自得者之言最爲逹理若孟子之言則無適不然如許大堯舜之道只於行止疾徐之間教人做了龜山先生語録卷第四終
