  text: 龜山先生語録卷第三
  hash: sha256:8eb42482ec70f8d154dbc71651843f42f126d675b5b7a07b88c5826ab08ee107
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0137_SBCK_003-1a}
body:
  text: 餘杭所聞揚雄云多聞守之以約多見守之以卓其言終有病不如孟子言博學而詳説之將以反説約也為無病蓋博學詳説所以趨約至於約則其道得矣謂之守以約卓於多聞多見之中將何守見此理分明然後知孟子之後其道不傳知孟子所謂天下可運於掌為不妄正心到寂然不動處方是極致以此感而遂通天下之故其於平天下也何有曾子開不以顔色語言假借人其愼重為得大臣之體於今可以庶幾前輩風流者惟此一人耳齊戰在聖人何以愼曰齊所以事神戰所以用民命固當愼也曰孔子云我戰則克祭則受福何也曰此非聖人之言王者之兵有征無戰必也臨事而懼好謀而成又敢自謂其能克乎夫祭之為道𥘉不為致福故祭祀不祈君子於其親春秋祭祀以時思之其他所祭報本反始而巳何求福之有又曰武王三分天下有其二度德量力皆足以勝受而無疑焉而曰受克豫非朕文考有罪惟豫小子無良是不敢必其戰之勝也而記稱孔子之言曰我戰則克必不然矣問或謂人主之權當自主持是否曰不為臣下奪其威柄此固是也書稱湯曰用人惟已而孟子亦曰見賢焉然後用之則人君之權豈可為人所分然孟子之論用人去人殺人雖不聽左右諸大夫之毀譽亦不聽國人之公因國人之公是非吾從而察之必有見焉而後行如此則權常在我矣若𥘉無所見姑信己意為之亦必終為人所惑不能固執矣問或謂衛於王室為近懿公為狄所滅齊桓公攘戎狄而封之當是時夷狄橫而中國微桓公獨能如此故孔子曰微管仲吾其𬒳髮左袵矣為其功如此也觀晉室之亂胡羯猖獗於中原當是時只為無一管仲故顚沛如此然則管仲之功後丗信難及也曰若以後丗論之其功不可謂不大自王道觀之則不可以為大也今人只為見管仲有此故莫敢輕議不知孔孟有為規模自別見得孔孟作處則管仲自小曰孔孟如何曰必也以天保以上治內以采薇以下治外雖有夷狄安得遽至中原乎如小雅盡廢則政事所以自治者俱亡四夷安得而不交侵中國安得而不微方是時縱能救之於巳亂雖使中國之人不至𬒳髮左袵蓋猶賢乎周衰之列國耳何足道哉如孟子所以敢輕鄙之者蓋以非王道不行故也曰然則孔子何為深取之曰聖人之於人雖有毫末之善必録之而况於仲乎若使孔子得君如管仲則管仲之事蓋不暇為矣問或謂今丗直道難行必有術焉若事事要是自立不任道如何行得觀周勃狄仁傑之在漢唐必須優柔浸灌蒙恥忍垢俟時而後發故功成事遂如必危言極論則速禍無輔矣曰學者當以聖王為師如周勃何人而可取法勃之不為祿産戮也幸矣觀其提北軍而入也號於衆曰為劉氏者左袒此最為無謀設使當時吕氏之黨先有以固結衆心皆為之右袒何以處之非唯皆右袒只使左右袒者相半亦不能決勝矣豈不危乎曰勃須知衆皆為劉氏故為此説曰既知其為劉氏則此説尤為贅語為勃之計但當問義之所在以義驅之可也如當時平勃兩人俯首以事吕后其在平則或有謀在勃驅之為亂亦固從之矣此何可保觀勃𥘉無學術亦無智略庸謬人耳方文帝諭之就國畏帝以事誅之至使人以兵甲左右為衛若果君命見誅勃殆將以所自衛者叛乎此尤可笑也後之人多以成敗論人物故如勃者得與忠賢之列亦可謂幸矣狄仁傑在武后時能撥亂反正謂之社稷臣可也然亦何嘗挾數任術觀史氏所載其議論未嘗不以正當時但以母子天性之説告武后其濵於死者亦屢矣卒至武后怒而言曰還汝太子夫豈嘗姑務柔從以隂幸事之成乎孟子曰君子創業垂統為可繼也若夫成功則天也人臣之事君或逺或近或去或不去歸潔其身而巳可也豈可枉已以求難必之功乎又言西漢之士多尚權謀戰國餘俗也觀髙祖時只有一張子旁乃君子人其他少有可敢者又言班固稱髙祖謂王陵少戇可以佐陳平然安劉氏者必勃此語蓋未驗也陳平獨任事甚久王陵一言而免終不曾佐得陳平平獨任亦無變孟子言人不足與適也政不足與間也惟大人為能格君心之非蓋人與政俱不足道則須使人君心術開悟然後天下事可循序整頓然格君心之非須要有大人之德大人過人處只是正已正已則上可以正君下可以正人今之賢者多尚權智不把正己為先縱得好時節終是做不徹或謂權智之人亦可以救時據某所見正不欲得如此人在人君左右壞人君心術因言人君喻臺諫言事若事當言可以言否曰英宗朝傅欽之奏劄子上不從因曰臺諫有合理會事却不理會欽之曰不知方今合理會者是何事上曰何不言蔡襄欽之云若襄有罪陛下何不自朝廷竟正典刑責之安用臣等言上曰欲使臺諫言其罪以公議出之欽之云若付之公議臣但見蔡襄辨山陵事有功不見其罪臣身為諫官使臣受旨言事臣不敢因言特旨及御筆行遣事曰仁宗時或勸云陛下當收攬權柄勿令人臣弄威福仁宗曰如何收攬權柄或曰凡事須當自中出則福威歸陛下矣仁宗曰此固是然措置天下事正不欲自朕出若自朕出皆是則可如有不是難於更改不如付之公議令宰相行之行之而天下以為不便則臺諫得言其失於是改之為易矣據仁宗識慮如此天下安得不治人君無心如天仁宗是也曾子開端嚴可畏有大臣之風若其輩流雖位崇望重少不以言語禮貌牢籠人者殊為失體章郇公在私第子弟有夜叩門稟事者公曰若是公事明早來待漏院理會若是私事即於堂前夫人處稟覆在中書一日坐處地陷徐起使人填之不以為怪家人聞之甚憂及公還家亦不言至晚公與弟虞部者對飲虞部問公今日聞中書地陷是否曰中書地何干汝事竟不言前輩大抵有此氣象卒乍搖撼不動為政要得厲威嚴使事事齊整甚易但失於不寬便不是古人作處孔子言居上不寬吾何以觀之哉又曰寬則得衆若使寬非常道聖人不只如此説了今人只要事事如意故覺見寬政悶人不知權柄在手不是使性氣處何嘗見百姓不畏官人但見官人多虐百姓耳然寬亦須有制始得若百事不管唯務寬大則胥吏舞文弄法不成官府須要權常在已操縱豫奪揔不由人儘寬不妨伯淳作縣常於坐右書視民如傷四字云某每日常有愧於此觀其用心應是不錯決撻了人古人於民若保赤子為其無知也常以無知恕之則雖有可怒之事亦無所施其怒無知則固不察利害所在教之趣利避害全在保者今赤子若無人保則雖有坑穽在前蹈之而不知故凡事疑有後害而民所見未到者當與他做主始得州縣近令勸誘富民買鹽勸誘即須有買者但異時令百姓買鹽其𥘉亦令勸誘百姓名一入官以後便不可脫為民父母豈可暫時罔之使之終身受其害孟子一部書只是要正人心教人存心養性收其放心至論仁義禮智則以惻隱羞惡辭讓是非之心為之端論邪説之害則曰生於其心害於其政論事君則欲格君心之非正君而國定千變萬化只説從心上來人能正心則事無足為者矣大學之修身齊家治國平天下其本只是正心誠意而巳心得其正然後知性之善孟子遇人便道性善永叔却言聖人之教人性非所先永叔論列是非利害文字上儘去得但於性分之內全無見處更説不行人性上不可添一物堯舜所以為萬丗法亦只是率性而巳所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔問如管仲之才使孔子得志行乎天下還用之否曰管仲髙才自不應廢但紀綱法度不出自他儘有用處曰若不使他自為或不肯退聽時如何曰如此則聖人廢之不問其才因言王道本於誠意觀管仲亦有是處但其意别耳如伐楚事責之以包茅不貢其言則是若其意豈為楚不勤王然後加兵但欲楚尊齊耳尊齊而不尊周管仲亦莫之詰也若實尊周專封之事仲豈宜為之故孟子曰五霸假之也蓋言其不以誠為之也今蘇州朱沖施貧度僧置安樂院給病者醫藥人賴以活甚衆其置物業則厚其直及其收息則視衆人所取而輕之此皆是好事只為其意正在於規利而竊譽於人故人終不以好人許之仲尼之門無道桓文之事而孟子直截不比數之其意亦猶此也又言自孟子後人不敢小管仲只為見他不破近丗儒者如荆公雖知卑管仲其實亦識他未盡况於餘人人若知王良羞與嬖奚比而得禽獸雖若丘陵弗為之意則管仲自然不足道又言管仲只為行詐故與王者别若王者純用公道而巳又言霸者之民歡虞如也治民使之歡樂有甚不得但如所謂皡皡如也則氣象便與霸者之丗不同蓋彼所以致人歡虞必有違道干譽之事若王者則如天亦不教人喜亦不教人怒瑩中言乘舟事最好然元祐舟不知為甚樁得太重及紹聖時不知却如何亦偏多載了據此兩舟所載者因何物得重今當減去何物則適平若𬒳人問到此須有處置始得如是本分處置得事之人必須有規矩繩墨一一調和得是不令錯了若只説得揔腦便休亦不濟事孟子言天下可運於掌如彼所言天下誠可運於掌也謂曽見志完云上合下便執得繼述兩字牢更不可易因言繼述兩字自好但今用之非是當時自合説與真箇道理且好貨好色孟子猶不鄙其説而推明之而况上有繼述之意豈容無所開道而使小人乘間謬為邪説以進則其末流激成今日之弊不足怪矣夫繼述之説始於記所稱武王周公今且舉周公一二事明之文王耕者九一至周公則更而為徹文王關市譏而不征至周公則征之武王克商乃反商政政由舊逮周公七年制禮作樂昔者文武所由之政安在聖人作處唯求一箇是砥道理若果是雖紂之政有所不革果非雖文武之政有所不因聖人何所容心因時乘理欲天下國家安利而巳且如神考十九年間艱難勤苦制為法度蓋欲以救時弊便百姓也便百姓則其志救時弊則其事此獨不當繼述乎今繼述足以救時弊便百姓也是亦神考而巳釋此不務乃欲一二以循熙豐之迹不然則為不孝此何理也且如祖宗有天下百有餘年海內安樂其法度豈皆不善神考一起而更之神考亦謂之不孝可乎自唐末至五代禍亂極矣太祖太宗順人心定天下傳數丗而無變此豈常人做得然而法度不免有弊者時使之然爾若謂時使之然則神考之法豈容獨能無弊輔偏救弊是乃神考所以望乎後丗也何害於繼述而顧以為不孝乎今之所患但人自不敢以正論陳之於上恐有滯礙妨嫌若吾輩在朝廷須是如此説始得其聽不聽則其去就之義焉議論不知道理所在徒有口辨即勝他識道理人不過如戰國説士遇孟子便無開口處問或謂荆公晚年詩多有譏誚神考處若下注腳儘做得謗訕宗廟他日亦拈得出曰君子作事只是循一箇道理不成荆公之徒箋注人詩文陷人以謗訕宗廟之罪吾輩也便學他昔王文正在中書寇萊公在密院中書偶倒用了印萊公須勾吏人行遣他日密院亦倒用了印中書吏人呈覆亦欲行遣文正問吏人汝等且道密院當𥘉行遣倒用印者是否曰不是文正曰既是不是不可學他不是更不問如今日所罪謗訕宗廟毀謗朝政者自是不是先王之時惟恐不聞其過故許人規諌至於舜求言乃立謗木是真欲人之謗己也書曰小人怨汝詈汝則皇自敬德蓋聖人之於天下常懼夫在己者有所未至故雖小人怨詈亦使人主自反詩三百篇經聖人刪過皆可以為後王法今其所言譏刺時君者幾半不知當時遭謗訕之罪者幾人夫禁止謗訕自出於後丗無道之君不是美事何足為法若祖宗功德自有天下後丗公議在豈容小已有所抑揚名之曰幽厲雖孝子慈孫百丗不能改夫為人子孫豈不欲聖賢其祖考但公議以惡名歸之則雖欲改之不能得也其曰名之曰幽厲當時誰實名之兹豈獨其子孫之不孝乎如此在人主前開陳乃是正理今之君子但見人言繼述亦言繼述見人罪謗訕亦欲求人謗訕之迹罪之如此只是相把持正理安在如元祐臣寮章疏論事今乃以為謗訕此理尤非使君子得志須當理會令分明今反謂他門亦嘗謗訕不唯效尤兼是使元祐賢人君子愈出脫不得濟甚事言季常在京時嘗問正心誠意如何便可以平天下與之言後丗自是無人正心若正得心其效自然如此此心一念之間毫髮有差便是不正要得常正除非聖人始得且如吾輩還敢便道自已心得其正否此須是於喜怒哀樂未發之際能體所謂中於喜怒哀樂之後能得所謂和致中和則天地可位萬物可育其於平天下何有因論孟子直以禹稷比方顔子只顔子在陋巷時如禹稷事業便可為之無難若正心誠意不足以平天下則禹稷功巍巍如此如顔子者如何做得問伯夷柳下惠如何見得能朝諸侯一天下曰只看顔子在陋巷便做得禹稷事業則夷惠之能朝諸侯一天下可知聖人之得邦家綏之斯來動之斯和自是力量不同如夷惠之風能使頑夫廉懦夫有立志鄙夫寬薄夫敦奮乎百丗之上下聞者莫不興起則其未有為之時人固已心恱而誠服之矣使得百里之地而君之其效冝如何叔孫通作原廟是不使人主改過而教之耻過作非也此為萬丗之害今太廟却間了只嚴奉景靈宫是舍先王之禮而從一謬妄之叔孫通也豈不過乎母意只是去私意若誠意則不可去也重見因讀東坡和淵明形影神詩其影答形云君如煙上火火盡君乃別我如鏡中像鏡壞我不滅曰影因形而有無是生滅相故佛嘗云一切有為法如夢幻泡影正言其非實有也何謂不滅他日亦嘗讀九成臺銘云此説得之莊周然而以江山吞吐草木俯仰衆竅呼吸鳥獸號鳴為天籟此乃周所謂地籟也但其文精妙讀之者或不之察耳言荆公云天使我有是之謂命命之在我之謂性是未知性命之理其曰使我正所謂使然也然使者可以為命乎以命在我為性則命自一物若中庸言天命之謂性性即天命也又豈二物哉如云在天為命在人為性此語似無病然亦不須如此説性命𥘉無二理第所由之者異耳率性之謂道如易所謂聖人之作易將以順性命之理是也謂常問志寧云至道無難惟嫌揀擇其理是否志寧曰是曰若爾公何不殺人放火志寧無語揚雄云學所以修性夫物有變壞然後可修性無變壞豈可修乎唯不假修故中庸但言率性尊德性孟子但言養性孔子但言盡性因論荆公法云青苗免役亦是法然非藏於民之道如青苗取息雖不多然嵗散萬緡則奪民二千緡入官既入官則民間不復可得矣免役法取民間錢雇人役於官其得此錢用者蓋皆州縣市井之人不及鄉民鄉民惟知輸而巳而不得用故今鄉民多乏於財也青苗二分之息可謂輕矣而不見有利於百姓何也今民間舉債其息少者亦須五七分多者或倍而亦不覺其為害曰惟其利輕且官中易得人徒知目前之利而不顧後患是以樂請若民間舉債則利重又百端要勒得之極難故人得巳且巳又青苗雖名取二分之息其實亦與民間無異蓋小民既有非不得巳而請者又有非不得巳用之且如請錢千或遇親舊於州縣間須有酒食之費不然亦須置小小不急之物只使二百錢巳可比民間四分之息又請納時往來之用與官中門户之賂遺至少亦不下百錢况又有胥吏追呼之煩非貨不行而公家期限又與私家不同而民之畏法者至舉債以輸官往往沿此遂破蕩産業者固多矣此所以有害而無利也或云官中息輕民得之可以自為經營歲豈無二分之息乎蓋未之思也若用之商販則錢散而難集正公家期逼卒收不聚失所指準其患不細往年富家知此患也官中配之請不得巳請而藏之比及期出私錢為息輸之官乃無患然使民如此是無事而侵擾之也何名輔助之政乎翟霖送正叔先生西遷道宿僧舍坐處背塑像先生令轉倚勿背霖問曰豈以其徒敬之故亦當敬耶正叔曰但具人形貌便不當慢因賞此語曰孔子云始作俑者其無後乎為其象人而用之也蓋象人而用之其流必至於用人君子無所不用其敬見似人者不忽於人可知矣若於似人者而生慢易之心其流必至於輕忽人孟子言仁者如射蓋生於子思射有似乎君子之説言大人者言不必信行不必果惟義所在蓋生於孔子以言必信行必果為硜硜然小人之説學校養士反不如居養安濟所費之多如餘杭學今止有三十人而居養安濟乃共有百餘人居養安濟人給米二升錢二十為士者所給如其數加四錢耳而士未必常在學也則其所費固寡於彼矣若其所養實是窮民疾病者誠善然所養止浮浪遊手之徒耳夫厲良民而養遊手是何政事近詔又收養年五十者自此往往來者益多所費當益廣夫年五十則子自可昏女自可嫁安得為無告之窮民乎又其所養多聚異鄉之人不許根問來處則雖有父子夫婦官吏何緣得知故其弊為甚若只許土著人就本貫收養亦易為檢察而其弊減矣因看合浦論無為軍役法曰天下役法多有不同處如所論與潭州處置全别潭州紹聖間所定皆出公之手又言吏有祿本要養其廉耻及不廉故可從而責之此為待之盡然亦須養得過方得若養他不過不如勿給徒費財耳何則彼為吏於此蓋欲以活父母妻子故為之今也養之不過雖有刑戮在前寧免其受賕乎如法曹之俸月十千而法司乃十二千則法吏之祿為過於法官又常平吏人月給六千此乃可責之以不受賕其餘千錢或二三千而巳給𥿄札尚不足安能活其家則其勢須至乞覔如必若法司常平吏人重其祿則財用之費無所從出兼是吏祿亦有不用多給者如學士茶鹽司吏人近制祿皆不減十千彼有何事繁難作何情弊而可以當此祿乎若此雖謂之妄費可也民之於上不從其令而朝廷惟以言諭之冝其以為虛文而莫之聽也今天下非徒不從上令而有司亦不自守成法觀官吏所奉行惟奉行朝廷之意而巳若皆守法則法亦自足以致治且如役法耆長許募而不許差輒差者徒二年然法當募上户其傭二千錢逐州縣定此餘杭所定豈有上户肯利若干錢而願役於官乎上户不願則其勢須至強使為之是名募而實差也其如法何又如日近買翎毛郡不敷諸縣令買者以於法不許抑配故也然翎毛非人所常有而郡中文移督責諸縣但使之催人以其所收藏翎毛輸之官若縣中只依法行遣安得辦集其勢亦須至抑配是名和買而實抑配也如此者皆法之不可行者也法至於不可行則人惟意之從而巳立法要使人易避而難犯則必行而無赦此法之所以行也今法太嚴密直使人於其間轉側不得故易犯是以犯法之人官吏多不忍行法必宛轉為犯者之地法如何行得人各有勝心勝心去盡而惟天理之循則機巧變詐不作若懷其勝心施之於事必以一已之是非為正其間不能無窒礙處又固執之不移此機巧變詐之所由生也孔子曰不知命無以為君子知命只是事事循天理而巳循天理則於事無固必無固必則計較無所用神考問伯淳王安石如何人伯淳云安石博學多聞則有之守約則未也又嘗問是聖人否伯淳云詩稱周公公孫碩膚赤舄几几聖人蓋如是若安石剛𥚹自任恐聖人不然問子思之不使白也喪出母也是乎曰禮適子不為出母服曰何也曰繼體也問陳莊子死赴於魯縣子謂繆公哭之而曰有愛而哭之有畏而哭之夫哭之也以畏何也曰以言丗有然也非古之禮也若古之大夫則束修之問不出竟故生無相問其死也何赴告之有哉後丗國亂而君昏為臣者交政於中國故生則同盟死則赴告非禮也故春秋因其卒而書之所以著其罪也仲素問橫渠云氣質之性如何曰人所資稟固有不同者若論其本則無不善蓋一隂一陽之謂道隂陽無不善而人則受之以生故也然而善者其常也亦有時而惡矣猶人之生也氣得其和則為安樂人及其有疾也以氣不和而然也然氣不和非其常治之而使其和則反常矣其常者性也此孟子所以言性善也橫渠説氣質之性亦云人之性有剛柔緩急強弱昏明而已非謂天地之性然也今夫水清者其常然也至於湛濁則沙泥混之矣沙泥既去其清者自若也是故君子於氣質之性必有以變之其澄濁而水清之義歟因見王逢原文集曰此髙論怨誹之人也他日嘗曰此子才則髙矣見道則未中庸深處多見於孟子之書其所傳也歟徐師川歸洪州欲不復來先生問之曰公免得仕宦否若端的有以自贍不必復來固好第亦須著仕官如何師川曰亦以免仕宦未得曰如此則當復來供職仕官處處一般既未免得須復為他官逃此之彼彼亦冝有不安處是無地可以自容也師川曰來此復為人所羅織陷於禍奈何曰顧吾所自為者如何耳苟自為者皆合道理而無愧然而不能免者命也不以道理為可慿依而徒懼其不免則無義無命矣師川曰極是亦待來此若做不得去之未為晚又言人只為不知命故才有些事便自勞攘若知得徹便於事無不安孔子曰天生德於豫桓魋其如豫何固嘗解云使孔子不免於恆魋之難是亦天也桓魋其如何哉蓋聖人之於命如此夫冨貴死生人無與焉何尤人之有孟子分明為臧倉所毀不遇於魯侯而以為不遇非臧倉之力蓋知命也列子曰桓公非能用讎也不得不用管仲非能舉賢不得不舉此説得之矣曰列子此説似知命然至其論夷惠以為矜清貞之尤以放於餓死寡宗以公孫朝穆之事為得計以堯舜桀紂之事為不足較茲豈非其過乎曰其過也若聖人所謂知命義常在其中矣然則彼亦豈得之而不盡者乎曰然仲素問知微之顯莫只是戒愼乎其所不睹恐懼乎其所不聞否曰然因言有僧入僧堂不言而出或曰莫道不言其聲如雷莊周之尸居而龍見淵默而雷聲可謂善言者也孟子直是知命滕文公以齊人築薛為恐問救之之術而對以君如彼何哉強為善而巳矣以竭力事大國則不得免問安之之道而對以太王居邠不以其所養人者害人而繼之以效死不去之䇿自丗俗觀之可謂無謀矣然以理言之只得如此説捨此則必為儀秦之為矣凡事求可功求成取必於智謀之末而不循天理之正者非聖賢之道也天理即所謂命語羅仲素云今之學者只為不知為學之方又不知學成要何用此事體大須是曾著力來方知不易夫學者學聖賢之所為也欲為聖賢之所為須是聞聖賢所得之道若只要博通古今為文章作忠信願愨不為非義之士而巳則古來如此等人不少然以為聞道則不可且如東漢之衰處士逸人與夫名節之士有聞當丗者多矣觀其作處責之以古聖賢之道則略無毫髮髣佛相似何也以彼於道𥘉無所聞故也今時學者平居則曰吾當為古人之所為才有事到手便措置不得蓋其所學以博通古今為文章或志於忠信願愨不為非義而巳而不知須是聞道故應如此由是觀之學而不聞道猶不學也仲素問詩如何看曰詩極難卒説大抵須要人體會不在推尋文義在心為志發言為詩情動於中而形於言言者情之所發也今觀是詩之言則必先觀是詩之情如何不知其情則雖精窮文義謂之不知詩可也子夏問巧笑倩兮美目盻兮何謂也子曰繪事後素曰禮後乎孔子以謂可與言詩如此全要體會何謂體會且如關雎之詩詩人以興后妃之德蓋如此也須當想象雎鳩為何物知雎鳩為摯而有別之禽則又想象關關為何聲知關關之聲為和而通則又想象在河之洲是何所在知河之洲為幽間逺人之地則知如是之禽其鳴聲如是而又居幽間逺人之地則后妃之德可以意曉矣是之謂體會惟體會得故看詩有味至於有味則詩之用在我矣語仲素西銘只是發明一箇事天底道理所謂事天者循天理而巳因論蘇明允權書衡論曰觀其著書之名巳非豈有山林逸民立言垂丗乃汲汲於用兵如此所見安得不為荆公所薄曰大蘇以當時不去二虜之患則天下不可為又其審敵篇引朝錯説景帝削地之䇿曰今日夷狄之勢是亦七國之勢其意蓋欲掃蕩二虜然後致太平耳曰才以用兵為事只見搔擾何時是天下息肩時節以仁宗之丗視二虜豈不勝如戰國時然而孟子在戰國時所論全不以兵為先豈以崇虛名而受實弊乎亦必有道矣問秦少遊進卷論所以禦戎乃欲以五路之兵歲出一路以擾夏人之耕如此是吾五歲一出兵而使夏人歲歲用兵此滅狄之道也當時元祐間有主此議者此果可用否曰王者之兵有征無戰必不得巳誅其君而弔其民可也豈容如此兼是亦無此理今常以五路之師合攻夏人尚時有不支歲出一路其傾國而來攻城破邑吾其可止以一路之衆當之乎大抵今之士人議論只是口頭説得施之於事未必有效言朱公掞上殿神考問欲再舉安南之師公掞對願陛下禽獸畜之蓋夷狄得其地不可居得其民不可使得巳且巳須要廣土闢地何益自紹聖崇寧以來所以待夏人大是失䇿有德此有人有人此有土有土此有財有財此有用今不務德以致人徒得其空地又運中國之財以守之是何所見君臣之間要當一德一心方作得事古之聖賢相與以濟大業蓋無不然者觀舜命禹征有苗巳誓師往伐而益以一言贊禹禹遂班師舜以禹之班師便為之誕敷文德而有苗格矣舜命禹徂征禹既行而益有言宜告之舜不告舜而告之禹禹承命於舜及其不遂行也宜先稟之舜乃擅反兵而不疑舜於二人者無責焉可也乃徇其所為從而相之益之意豈不曰禹猶舜而禹之意豈不曰舜猶己也歟夫是之謂一德一心自今觀之則益之言可以謂之沮壞成事而禹之事為逗留君命矣然古之君臣各相體悉如此古人立功所以易而後丗成事所以難也語仲素曰某嘗有數句教學者讀書之法云以身體之以心驗之從容默會於幽間靜一之中超然自得於書言象意之表此蓋某所為者如此又云西銘會古人用心要處為文正如杜順作法界觀樣仲素問盡其心者知其性如何是盡心底道理曰未言盡心須先理會心是何物又問曰心之為物明白洞逹廣大靜一若體會得了然分明然後可以言盡未理會得心盡箇甚能盡其心自然知性不用問人大抵須先理會仁之為道知仁則知心知心則知性是三者𥘉無異也橫渠作西銘亦只是要學者求仁而巳論及陽城事謂永叔不能純夫取之其言曰陽城蓋有待而為者也後丗猶責之無巳其不成人之美亦甚哉此論似近厚曰陽城固可取然以為法則不可裴延齡之欲相其來非一朝一夕何不救之於漸乎至於陸贄之貶然後論延齡之姦佞無益矣觀古人退小人之道不然易之姤卦曰女壯勿用取女夫姤一隂生未壯也而曰壯者生而不巳固有壯之理也取女則引而與之齊也引而與之齊則難制矣隂者小人之象也小人固當制之於漸也故當隂之生則知其有壯之理其有壯之理則勿用取女可也是以姤之𥘉爻曰繫于金柅貞吉有攸往見凶金柅止車之行也隂之𥘉動必有以柅之其制之於漸乎蓋小人之惡制之於未成則易制之於巳成則難延齡之用事權傾宰相雖不正名其為相其惡自若也何更云待其為相然後取白麻壞之耶然城之所為當時所難能也取之亦是但不可以為法耳龜山先生語録卷第三
