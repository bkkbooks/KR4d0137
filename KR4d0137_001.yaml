body:
  text: 荆州所聞甲申四月至乙先生曰自堯舜以前載籍未具丗所有者獨伏犧所畫八卦耳當是之時聖賢如彼其多也自孔子刪定繫作之後更秦歷漢以迄于今其書至不可勝紀人之所資以為學者冝易於古然其間千數百年求一人如古之聖賢卒不易得何哉豈道之所傳固不在於文字之多寡乎夫堯舜禹皋陶皆稱若稽古非無待於學也其學果何以乎由是觀之聖賢之所以為聖賢其用心必有在矣學者不可不察之也觀孔門弟子之徒其事師雖至於流離困餓濱於死而不去非要譽而規利也所以甘心焉者其所求也大矣流離困餓且濱於死有不足道者學者知此然後知學之不可巳矣古之學者以聖人為師其學有不至故其德有差焉人見聖人之難為也故凡學者以聖人為可至則必以為狂而竊笑之夫聖人固未易至若舍聖人而學是將何所取則乎以聖人為師猶學射而立的然的立於彼然後射者可視之而求中若其中不中則在人而已不立之的以何為凖問曽西不為管仲而於子路則曰吾先子之所畏或曰羞管仲之所巳為慕子路之所未就此説是否曰孔子曰由也千乘之國可使治其賦也使其見於施為如是而已其於九合諸侯一正天下固有所不逮也然則如之何曰管仲之功子路未必能之然子路譬之御者則範我馳驅者也若管仲蓋詭遇耳曾西仲尼之徒也蓋不道管仲之事六經不言無心惟佛氏言之亦不言修性惟揚雄言之心不可無性不假修故易止言洗心盡性記言正心尊德性孟子言存心養性佛氏和順於道德之意蓋有之理於義則未也聖人以為尋常事者莊周則夸言之莊周之博乃禪家呵佛罵祖之類是也如逍遙遊養生主曲譬廣喻張大其説論其要則逍遙遊一篇乃子思所謂無入而不自得而養生主一篇乃孟子所謂行其所無事而巳問孔子曰中庸之為德其至矣乎何也曰至所謂極也極猶屋之極所處則至矣下是為不及上焉則為過或者曰髙明所以處已中庸所以處人如此則是聖賢所以自待者常過而以其所賤者事君親也而可乎然則如之何曰髙明即中庸也髙明者中庸之體中庸者髙明之用耳髙明亦猶所謂至也問或曰中所以立常權所以盡變不知權則不足以應物知權則中有時乎不必用矣是否曰知中則一作即知權不知權是不知中也曰既謂之中斯有定所必有權焉是中與權固異矣曰猶坐於此室室自有中移而坐於堂則向之所謂中者今不中矣堂固自有中合堂室而觀之蓋又有堂室之中焉若居今之所守向之中是不知權豈非不知中乎又如以一尺之物約五寸而執之中也一尺而厚薄小大之體殊則所執者輕重不等矣猶執五寸以為中是無權也蓋五寸之執長短多寡之中而非厚薄小大之中也欲求厚薄小大之中則釋五寸之約唯輕重之知而其中得矣故權以中行中因權立中庸之書不言權其曰君子而時中蓋所謂權也一連下段舜跖之分利與善之間也利善之間相去甚微學者不可不知為文要有溫柔敦厚之氣對人主語言及章疏文字溫柔敦厚尤不可無如子瞻詩多於譏玩殊無惻怛愛君之意荆公在朝論事多不循理惟是爭氣而巳何以事君君子之所養要令暴慢邪僻之氣不設於身體陶淵明詩所不可及者沖淡深粹出於自然若曽用力學然後知淵明詩非著力之所能成私意去盡然後可以應丗老子曰公乃王儒佛深處所差杪忽耳見儒者之道分明則佛在其下矣今學之徒曰儒者之道在其下是不見吾道之大也為佛者既不讀儒書或讀之而不深究其義為儒者又自小也然則道何由明哉君子無終食之間違仁説者曰飲食必有祭是也曰如是則造次顚沛之際遑遽急迫甚矣欲不離仁仁之道安在且飲食必有祭小人亦然豈能仁乎孔子以其子妻公冶長以其兄之子妻南容説者曰君子之處其子與處其兄之子固不同也曰兄弟之子猶子也何擇乎誠如所言是聖人猶有私意也聖人不容有私意若二女之少長美惡必求其對所妻之先後未必同時安在其厚於兄而薄於己耶記此者特言如是二人可託以女子之終身且聖人為子擇配不求其他故可法也或謂孔子登東山而小魯登泰山而小天下此言勝物而小之曰使聖人以勝物為心是將自小安能小物聖人本無勝物之心身之所處者髙則物自不得不下耳葉公以證父之攘羊為直而孔子以為吾黨之直者父為子隱子為父隱夫父子之真情豈欲相暴其惡哉行其真情乃所謂直反情以為直則失其所以直矣乞醯之不得為直亦猶是也周禮王燕則以膳夫為獻主説者曰君臣之義不可以燕廢曰是不然此孟子所謂養君子之道也禮受爵於君前則降而再拜燕所以待羣臣嘉賔也而使之有升降拜揖之勞是以犬馬畜之矣故以膳夫為獻主而主不自獻酬焉是乃所以為養君子之道而廩人繼粟庖人繼肉之義也周禮凡用皆會唯王及后不會説者曰不得以有司之法制之曰有司之不能制天子也固矣然而九式之職冡宰任之王恣其費用有司雖不會冡宰得以九式論於王矣故王后不會非蕩然無以禁止之也制之有冡宰之義而非以有司之法故也或曰書之終秦誓以見聖人之樂人悔過也故凡過而能悔者取其悔而不追其過可也今有殺人而𬒳刑者臨刑而曰吾惟殺人以至此也仁者於此亦必哀而捨之曰書之有秦費二誓以志帝王之誥命於是絶故也其大意則言有國者不可廢誓於誓之中其事又有可取者則如秦之罪己而不責人是也若曰取其悔而巳不咎其過其既悔而有過也亦不當罪乎聖人以恕待人於人之悔也嘉之可也如以悔為是而不問其改與不改則改過者鮮矣故君子之取人也取其改不取其悔且殺人至於𬒳刑而自狀其過蓋傷其死之不善也使殺人而不必死其肯悔乎崤之戰不敗則秦自以為功矣何以知之以濟河之師知之也濟河之師何義哉君子務本言凡所務者惟本而已若仁之於孝悌其本之一端耳蓋為仁必自孝悌推之然後能為仁也其曰為仁與體仁者異矣體仁則無本末之别矣孔子曰老者安之朋友信之少者懷之此無待乎推之也孟子曰老吾老以及人之老幼吾幼以及人之幼此推之也推之所謂為仁問子貢貨殖誠如史遷之言否曰孔門所謂貨殖者但其中未能忘利耳豈若商賈之為哉曰樊遲請學稼學圃如何曰此亦非為利也其所願學正許子並耕之意而命之為小人者蓋稼圃乃小人之事而非君子之所當務也君子勞心小人勞力先生嘗夜夢人問王由足用為善何以見語之曰齊王只是朴實故足以為善如好貨好色好勇與夫好丗俗之樂皆以直告而不隱於孟子其朴實可知若乃其心不然而謬為大言以欺人是人終不可與入堯舜之道矣何善之能為狼跋之詩曰公孫碩膚赤舄几几周公之遇謗何其安間而不迫也學詩者不在語言文字當想其氣味則詩之意得矣孟子言説大人則藐之至於以己之長方人之短猶有此等氣象在若孔子則無此矣觀鄉黨一篇與上大夫言誾誾如也與下大夫言侃侃如也以至見冕者與瞽者雖褻必以貌如此何暇藐人禮曰貴貴為其近於君也敬長為其近於親也故孔子謂君子畏大人孔子言由求為具臣曰弒父與君亦不從也由求如是而巳乎曰弒父與君言其大者蓋小者不能不從故也若季氏旅太山伐顓臾而不能救之之事是巳然則或許其升堂且皆在政事之科何也曰小事之失亦未必皆從但自弒父與君而下或從一事則不得為不從若弒父與君則決不從矣進此一等便為大臣如孔孟之事君是也故孔孟雖當亂丗而遇庸暗之主一毫亦不放過事道與祿仕不同常夷甫家貧召入朝神宗欲優厚之令兼數局如登聞鼓染院之類庶幾俸給可贍其家夷甫一切受之不辭及正叔以白衣擢為勸講之官朝廷亦使之兼他職則固辭蓋前日所以不仕者為道也則今日之仕須是官足以行道乃可受不然是茍祿也然後丗道學不明君子之辭受取舍人鮮能知之故常公之不辭人不以為非而程公之辭人亦不以為是王逢原才髙識逺未必見道觀其所著乃髙論怨誹之流假使用之亦何能為春秋昭如日星但説者斷以已意故有異同之論若義理巳明春秋不難知也春秋始於隱其説紛紛無定論孟子有言王者之迹熄而詩亡詩亡然後春秋作據平王之崩在隱公之三年也則隱公即位實在平王之時自幽王為犬戎所滅而平王立於東遷當是時黍離降而為國風則王者之詩亡矣此春秋所以作也易於咸卦𥘉六言咸其拇六二言咸其腓九三言咸其股九五言咸其脢上六言咸其輔頰舌至於九四一爻由一身觀之則心是也獨不言心其説以謂有心以感物則其應必狹矣唯忘心而待物之感故能無所不應其繇辭曰貞吉悔亡憧憧往來朋從爾思夫思皆緣其類而巳不能周也所謂朋從者以類而應故也故孔子繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫心猶鏡也居其所而物自以形來則所鑒者廣矣若執鏡隨物以度其形其照幾何或曰思造形之上極過是非思之所能及故唯天下之至神則無思也無思所以體道有思所以應丗此為不知易之義也易所謂無思者以謂無所事乎思云耳故其於天下之故感而通之而巳今而曰不可以有思又曰不能無思此何理哉或曰聖人所以大過人者蓋能以身救天下之弊耳昔伊尹之任其弊多進而寡退苟得而害義故伯夷出而救之伯夷之清其弊多退而寡進過廉而復刻故柳下惠出而救之柳下惠之和其弊多汚而寡潔惡異而尚同故孔子出而救之是故伯夷不清不足以救伊尹之任柳下惠不和不足以救伯夷之清此三人者因時之偏而救之非天下之中道也故久必弊至孔子之時三聖人之弊各極於天下故孔子集其行而大成萬丗之法然後聖人之道無弊其所以無弊者豈孔子一人之力哉四人者相為終始也使三聖人者當孔子之時皆足以為孔子矣曰何不思之甚也由湯至於文王之時五百有餘嵗其間賢聖之君六七作其成就人才之衆至其衰丗尤有存者使伊尹有弊當時更丗之久上之為君下之為臣皆足以有為獨無以革之乎由周至于戰國之際又五百有餘嵗文武周公之化不為不深使伯夷之弊至是猶在則周之聖人所謂一道德以同風俗者殆無輔於丗而獨俟一柳下惠耶况孔子去柳下惠未逺若柳下惠能矯伯夷之清使天下從之其弊不應繼踵而作而孔子救之又何其遽也且孔子之時荷蕢荷蓧接輿沮溺之流必退者尚多也則柳下惠之所為是果何益乎故為聖人救弊之説者是亦不思而巳矣夫伊尹固聖人之任者然以為必於進則不可也湯三使往聘之然後幡然以就湯不然將不從其聘耶則伊尹之不必進可見伯夷固聖人之清者然以為必於退則不可也方其辟紂居諸海濵以待天下之清聞西伯善養老者則歸之則伯夷之不必退亦可見若柳下惠孔子蓋以謂直道而事人孟子亦稱其不以三公易其介夫亦豈以同為和乎由是觀之其弊果何自而得之耶若曰孔子之道所以無弊者四人者相為終始使三聖人當孔子之時亦皆足以為孔子此尤不可孟子曰伯夷伊尹不同道又曰自生民以來未有盛於孔子而伯夷伊尹不足以班之而其所謂同者得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下皆不為而巳彼為任為清為和一節之至於聖人者也其可以為孔子乎夫以三人為聖者孟子發之也而孟子之言其辨如彼今釋孟子之言安得強為之説乎雖然此孟子之言也學者於聖人又當自有所見自無所見縱得孟子之旨何與吾事問伊尹五就湯五就桀何也曰其就湯也以三䀻之勤也其就桀也湯進之也然則何為事桀曰既就湯則當以湯之心為心湯豈有伐桀之意哉其不得巳而伐之也人歸之天命之耳方其進伊尹以事桀也蓋欲其悔過遷善而巳茍悔過遷善則吾北靣而臣之固所願也若湯𥘉求伊尹即有伐桀之意而伊尹遂相之是以取天下為心也以取天下為心豈聖人之心哉問伯夷伊尹柳下惠之行固不同矣使伯夷居湯之丗就湯之聘乎曰安得而不就然則湯使之就桀則就之乎曰否何以知其然曰伯夷聞文王作興則歸之宜其就湯之聘然而橫政之所出橫民之所止不忍居也使之事桀蓋有所不屑矣然則其果相湯也肯伐桀乎曰至天下共叛之桀為獨夫伯夷伐之亦何恤哉或曰湯之伐桀也衆以為我后不恤我衆舍我穡事而割正夏而湯告以必往是聖人之任者也文王三分天下有其二以服事商是聖之清者也曰非也湯之伐桀雖其衆有不恱之言憚勞而巳若夏之人則不然曰時日曷喪豫及汝皆亡故攸徂之民室家相慶簞食壷漿以迎王師湯雖不往不可得矣文王之時紂猶有天下三分之一民猶以為君則文王安得而不事之至於武王而受罔有悛心賢人君子不為所殺則或為囚奴或去國紂之在天下為一夫矣故武王誅之亦不得巳也孟子不云取之而燕民不恱則勿取古之人有行之者文王是也取之而燕民恱則取之古之人有行之者武王是也由此觀之湯非樂為任而文王非樂為清也會逢其適而巳孟子與人君言皆所以擴其善心而革其非不止就事論事如論齊王之愛牛而曰是心足以王論王之好樂而使之與百姓同樂論王之好貨好色好勇而陳周之先王之事若使為人臣者論事每如此而其君肯聽豈不能堯舜其君又曰孟子對人君論事句句未嘗離仁此所謂王道也曰安得句句不離乎仁曰須是知一以貫之之理曰一以貫之仁足以盡之否曰孟子固曰一者何曰仁也仁之用大矣今之學者仁之體亦不曾體究得齊王顧鴻鴈麋鹿以問孟子孟子因以為賢者而後樂此至其論文王夏桀之所以異則獨樂不可也丗之君子其賢者乎則必語王以憂民而勿為臺沼苑囿之觀是拂其欲也其佞者乎則必語王以自樂而廣其侈心是縱其欲也二者皆非能引君以當道唯孟子之言常於毫髮之間剖析利害之所在使人君化焉而不自知夫如是其在朝廷則可以格君心之非而其君易行也或曰居今之丗去就之際不必一一中節欲其皆中節則道不得行矣曰何其不自重也枉己者其能直人乎古之人寧道之不行而不輕其去就如孔孟雖在戰國之時其進必以正以至終於不得行而死是矣顧今之丗獨不如戰國之時乎使不恤其去就可以行道孔孟當先為之矣孔孟豈不欲道之行哉或曰以術行道而心正如何曰謂之君子豈有心不正者當論其所行之是否爾且以術行道未免枉己與其自枉不若不得行之愈也宋牼以利説秦楚使之罷兵以息兩國之爭其心未為過也然孟子力抵之蓋君子之事君其説不可惟利之從苟惟利之從則人君所見者利而巳彼有軋吾謀者其説又利於我吾説必見屈矣故不若與之談道理道理既明人自不能勝也所謂道理之談孟子之仁義是也王霸之佐其義利之間乎一毫為利則不足為王矣後丗道學不明人以顔子伯夷只作一節之士若孟子之論則是兩人者豈清修介潔者耶如伯夷直許之以朝諸侯一天下顔子直許之以禹稷之事方太公釣於渭不遇文王特一老漁父耳及一朝用之乃有鷹揚之勇非文王有獨見之明誰能知之學者須體此意然後進退隱顯各得其當或曰德而巳矣奚取於聰明曰徒取其德或有有德而不聰明者如此則人得以欺罔之何以濟務故書稱堯舜禹湯文武皆言其聰明為是故也黃叔度學充其德雖顔子可至矣一介之與萬鍾若論利則有多寡若論義其理一也伊尹惟能一介知所取與故能祿之以天下弗顧繫馬千駟弗視自後丗觀之則一介不以豫人為太吝一介不以取諸人為太潔然君子之取豫適於義而巳豫之嗇取之微雖若不足道矣然苟害於義又何多寡之間乎孔子於公西赤之富不恤其請於原憲之貧不許其辭此知所豫者也孟子言非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰此知所取者也孟子稱舜象憂亦憂象喜亦喜此語最冝味之夫舜之意唯恐不獲於象也則象喜舜自喜夫豈有偽乎是之謂不藏怒不宿怨問象日以殺舜為事而舜終不為所殺何也曰堯在上天下豈容有殺兄者乎此語自是萬章所傳之謬據書所載但云象傲而巳觀萬章之言傲何足以盡之其言殺舜之時堯巳妻之二女又使其子九男百官皆事舜於畎畒之中象必不敢但萬章所問其大意不在此故孟子當時亦不暇辨孟子言舜之怨慕非深知舜之心不能及此據舜惟患不順於父母不謂其盡孝也凱風之詩曰母氏聖善我無令人孝子之事親如此此孔子所以取之也孔子曰君子之道四丘未能一焉若乃自以為能則失之矣顔子所學學舜而巳蓋舜於人倫無所不盡也以為父子盡父子之道以為君臣盡君臣之道以為夫盡夫道以為兄盡兄道此孟子所謂舜為法於天下可傳於後丗者也孟子所憂亦憂不如舜耳人能以舜為心其學不患不進問將順其美後丗之説或成阿諛恐是引其君以當道曰然此正如孟子所謂是心足以王若曰以小易大則非其情以謂見牛未見羊而欲以羊易牛乃所以為仁引之使知王政之可為是謂將順又曰詳味此一章可見古人事君之心韓信用兵在楚漢之間則為善矣方之五霸已自不及以無節制故也如信之軍修武髙祖即其卧內奪之印易置諸將信尚未知此與棘門霸上之軍何異但信用兵能以術驅人使自為戰當時亦無有以節制之兵當之者故信數得以取勝也王者之兵未嘗以術勝人然亦不可以計敗後丗惟諸葛亮李靖為知兵如諸葛亮巳死司馬仲逹觀其行營軍壘不覺歎服而李靖惟以正出竒此為得法制之意而不務僥幸者也古人未嘗不知兵如周官之法雖坐作進退之末莫不有節若平時不學一旦緩急何以應敵如此則學者於行師御衆戰陳營壘之事不可不講史言成安君儒者故為韓信所勝成安君豈真儒者哉若真儒必不為韓信所詐如曰吾行仁義云耳人得而罔之是木偶人也夫兵雖不貴詐亦人所不得而詐然後為善觀戰國用兵中原之戰也若今之用兵禦夷狄耳力可以戰則戰勢利於守則守來則拒之去則勿追則邊鄙自然無事今乃反挑之且侵其地巳非理矣其決勝必取而至於用狙詐也又何足怪若賢將必不以窮鬪逺討為事何用狙詐蓋夷狄之戰與中原之戰異夷狄難與較曲直是非惟恃力耳但以禽獸待之可也以禽獸待之如前所為是矣問今之為將帥者不必用狙詐固是奈兵官武人之有智略者莫非狙詐之流若無狙詐如何使人曰君子無所往而不以誠但至誠惻怛則人自感動曰至誠惻怛可也然今之置帥朝除暮易若以至誠為務須是積久上下相諳其效方見卒然施之未必有輔曰誠動於此物應於彼速於影響豈必在久如郭子儀守河陽李光弼代之一號令而金鼓旗幟為之精明此特其號令各有體耳推誠亦猶是也正叔先生過范堯夫治所謂堯夫曰聞公有言作帥當使三軍愛之如父母是否曰然非歟曰公第能言之耳未必能行也曰何以言之曰聞舊帥方卒公始代之便設筵張樂犒軍此所以知公之必不能使三軍愛之如父母也曰當時自合打散設筵張樂却是錯曰打散亦不可彼卒伍之所利者財食也使其不得財食則知新帥之所以不給賜財食者為舊帥之亡也夫舊帥亦父母也今其亡未久而給賜如常卒伍之愚忘其上以此耳然則不能使之觀舊帥如父母則必不能使之以我為父母矣堯夫是日追送正叔曰若不逺出不聞此言祖宗能用人命故太祖嘗曰我以一縑易一胡人首不過十萬丐奴之衆可盡唯能如此此所以能取天下今獲一劫盜亦須以數十千賞之若只使一縑欲易一胡人首人必不為用唯不能用人命此所以必至於厚賞也觀祖宗時江南擅強河東未服兩浙川廣尚守巢穴方是時所有財賦特中原之地耳其聚斂科配蓋不若今之悉也其後祖宗削平僭亂只用所有不患乏財使如今日厚賞安能取天下陸宣公當擾攘之際説其君未嘗用數觀其奏議可見欲論天下事當以此為法宣公在朝自以不恤其身知無不言言無不盡至於遷貶唯杜門集古方書而巳可謂知進退者吕晦叔真大人其言簡而意足孫莘老嘗言𥙿陵好問且曰好問則𥙿晦叔曰好問而𥙿不若聽德而聰人有非劉向強聒而不舍者吕晦叔曰劉向貴戚之卿此語可謂忠厚然向之眷眷於漢室而不忍去則是也至於上變論事亦可謂不知命矣問以匹夫一日而見天子天子問焉盡所懷而陳之則事必有窒礙者不盡則為不忠如何曰事亦須量深淺孔子曰信而後諫未信則以為謗已也易之恆曰浚恆凶此恆之𥘉也故當以漸而不可以浚浚則凶矣假如問人臣之忠邪其親信者誰歟遽與之辨别是非則有失身之悔君子於此但不可以忠為邪以邪為忠語言之間故不無委曲也至於論理則不然如惠王問孟子何以利吾國則當言何必曰利宣王問孟子卿不同則當以正對蓋不直則道不見故也丗之君子其平居談道甚明論議可聽至其出立朝廷之上則其行事多與所言相戾至有圖王而實霸行義而規利者蓋以其學得之文字之中而未嘗以心驗之故也若心之所得則曰吾所以為已而巳是故心迹常判而為二心迹既判而為二故事事違其所學人臣之事君豈可佐以刑名之説如此是使人主失仁心也人主無仁心則不足以得人故人臣能使其君視民如傷則王道行矣或曰特旨乃人君威福之權不可無也曰不然古者用刑王三宥之若案法定罪而不敢赦則在有司夫惟有司守法而不敢移故人主得以養其仁心今也法不應誅而人主必以特旨誅之是有司之法不必守而使人主失仁心矣荆公在上前爭論或為上所疑則曰臣之素行似不至無廉耻如何不足信且論事當問事之是非利害如何豈可以素有廉耻劫人使信已也夫廉耻在常人足道若君子更自矜其廉耻亦淺矣蓋廉耻自君子所當為者如人守官曰我固不受贓不受贓豈分外事乎理財作人兩事其説非不善然丗儒所謂理財者務為聚斂而所謂作人者起其奔競好進之心而巳易之言理財詩之言作人似不如此周官平頒其興積説者曰無問其欲否槩與之也故假此為青苗之法當春則平頒秋成則入之又加息焉以謂不取息則舟車之費鼠雀之耗官吏之俸給無所從出故不得不然此為之辭耳先生省耕斂而為之輔助以救民急而巳方其出也未嘗望入豈復求息取其息而曰非以漁利也其可乎孟子論法以謂凶年糞其田而不足則必取盈焉使民終嵗勤動不得以養其父母又稱貨而益之是為不善今也無問其欲否而頒之亦無問年之豐凶而必取其息不然則以刑法加焉周官之意果如是乎朝廷設法賣酒所在吏官遂張樂集妓女以來小民此最為害教而必為之辭曰與民同樂豈不誣哉夫誘引無知之民以漁其財是在百姓為之理亦當禁而官吏為之上下不以為怪不知為政之過也且民之有財亦須上之人與之愛惜不與之愛惜而巧求暗取之雖無鞭笞以強民其所為有甚於鞭笞矣余在潭州瀏陽方官散青苗時凡酒肆食店與夫俳優戲劇之罔民財者悉有以禁之散錢巳然後令如故官賣酒舊嘗至是時亦必以妓樂隨處張設頗得民利或以請不許往往民間得錢遂用之有方常平法州縣寺舍嵗用有餘則以歸官賑民之窮餓者余為瀏陽日方為立法使行旅之疾病飢踣於道者隨所在申縣縣令寺舍飲食之欲人之入於吾境者無不得其所也其事未及行而余以罪去官至今以為恨錢塘內造什物守臣不知其數恣官官所為至數年未已傷財害民莫此為甚使其器用一一得以奉御兹固無嫌其實公得其一私得其十其十者非以自奉則過為竒技淫巧以自獻於上與夫宫嬪之貴幸者此弊尤不可言使豫守錢塘必先奏上乞降所造之數付有司為之以進庶幾宦官不得容其姦是雖於事未有大輔亦守臣安百姓節國用之一端也如此而得罪則有名矣或勸先生解經曰不敢易也曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎夫傳而不習以處已則不信以待人則不忠三者胥失也昔有勸正叔先生出易傳示人者正叔曰獨不望學之進乎姑遲之覺耄即傳矣蓋已耄則學不復進故也學不復進若猶不可傳是其言不足以垂後矣六經之義驗之於心而然施之於行事而順然後為得驗之於心而不然施之於行事而不順則非所謂經義今之治經者為無用之文徼幸科第而已果何益哉今所謂博學者特通歷代之故事而已必欲取堯舜三代之法兼明而默識之以斷後丗所為之中否而去取焉蓋未能也孟子之學蓋有以為不足學而不學者矣若諸侯之禮是也未有當學而不學者也余觀熙寧元豐之君子皆通曉丗務而所取以為證者秦漢以下之事而已故有為秦漢以上之説者與之爭輒不勝若今之論事者多以三代為言其實未必曉有能以三代之法一一與之剖析是非有不戰而自屈者然此須深知三代致治之意方可若周官之書先王經丗之務也不可不講若有意於丗須是事事明了胸中無疑方能濟務如馬周以一介草茅言天下事若素宦於朝若非嘗學來安得生知因論馬周言事每事須開人主一線路終是不如魏證之正如諫太宗避暑事親之道甚善然又曰鑾輿之出有日不可遽止願示還期若事非是即從而止之何用如此此正孟子所謂月攘一雞者豈是以堯舜望其君乎禇遂良修起居注唐太宗曰朕有不善亦當記之乎或為之言曰借使遂良不記天下亦當記之曰此語亦善但人主好名則可以此動之耳未盡也夫君子居其室出其言善則千里之外應之出其言不善則千里之外違之故言行君子之樞機不可不愼縱使史官不記而民之應違如此雖欲自掩其不善其可得乎試教授宏辭科乃是以文字自售古人行已似不如此今之進士使豪傑者出必不肯就然以謂舍此則仕進無路故為不得巳之計或是為貧或欲緣是少試其才既得官矣又以僥求榮逹此何義哉龜山先生語録卷第一
